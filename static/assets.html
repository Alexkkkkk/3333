<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | ASSETS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050b10] text-slate-300">
    <canvas id="bg-canvas"></canvas>
    
    <header class="p-6 flex justify-between items-center relative z-50">
        <a href="index.html" class="flex items-center gap-2">
            <img src="/images/logo.png" alt="Logo" class="w-10 h-10">
            <h1 class="text-xl font-black italic text-white uppercase">QUAN<span class="text-cyan-400">CORE</span></h1>
        </a>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-32 relative z-10">
        <div class="glass-card bg-gradient-to-br from-cyan-500/10 to-transparent p-6 rounded-3xl border border-white/10 backdrop-blur-md mb-6 shadow-2xl shadow-cyan-500/5">
            <p class="text-[10px] text-cyan-400 font-black uppercase tracking-widest mb-1">Portfolio Value</p>
            <h2 class="text-4xl font-black text-white italic" id="total-value">$1,240.55</h2>
            <p class="text-[10px] text-slate-500 mt-2 uppercase">Core Assets Monitoring</p>
        </div>

        <div class="space-y-3">
            <div class="bg-black/40 border border-white/5 p-4 rounded-2xl flex justify-between items-center hover:bg-white/5 hover:border-cyan-500/30 transition-all duration-300">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-cyan-500/20 rounded-full flex items-center justify-center border border-cyan-500/30 text-cyan-400 font-bold shadow-inner">T</div>
                    <div>
                        <p class="font-bold text-white leading-none">TON</p>
                        <p class="text-[10px] text-slate-500 uppercase mt-1">Native Token</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold text-white text-lg" id="asset-ton-bal">0.00</p>
                    <p class="text-[10px] text-cyan-400 font-medium tracking-wider">Mainnet</p>
                </div>
            </div>

            <div class="bg-black/40 border border-white/5 p-4 rounded-2xl flex justify-between items-center hover:bg-white/5 hover:border-purple-500/30 transition-all duration-300">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-purple-500/20 rounded-full flex items-center justify-center border border-purple-500/30 text-purple-400 font-bold shadow-inner">Q</div>
                    <div>
                        <p class="font-bold text-white leading-none">QUAN</p>
                        <p class="text-[10px] text-slate-500 uppercase mt-1">Utility Jetton</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold text-white text-lg">450,000</p>
                    <p class="text-[10px] text-purple-400 font-medium tracking-wider">Active</p>
                </div>
            </div>

            <div class="py-8 text-center">
                <div class="h-[1px] w-12 bg-white/10 mx-auto mb-2"></div>
                <p class="text-[8px] text-slate-600 uppercase tracking-[0.3em]">End of assets</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/60 backdrop-blur-2xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-bold">HOME</span>
        </a>
        <a href="swap.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="text-[9px] font-bold">SWAP</span>
        </a>
        <a href="forge.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            <span class="text-[9px] font-bold">FORGE</span>
        </a>
        <a href="assets.html" class="flex flex-col items-center text-cyan-400 transition-all">
            <svg class="w-6 h-6 mb-1 scale-110" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[9px] font-bold">DATA</span>
        </a>
        <a href="/admin" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-bold">OPERATOR</span>
        </a>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        // Получение актуального баланса
        async function updateAssetInfo() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                if (data.balance) {
                    document.getElementById('asset-ton-bal').innerText = data.balance;
                }
            } catch (e) {
                console.log("Core connection status: OFFLINE");
            }
        }

        // Particle background logic
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { 
                canvas.width = window.innerWidth; 
                canvas.height = window.innerHeight; 
            }
            window.addEventListener('resize', resize);
            resize();
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.speed = Math.random() * 0.4 + 0.1;
                    this.opacity = Math.random() * 0.2;
                }
                update() { 
                    this.y -= this.speed; 
                    if (this.y < 0) this.y = canvas.height; 
                }
                draw() { 
                    ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`; 
                    ctx.fillRect(this.x, this.y, 1, 1); 
                }
            }
            for(let i=0; i<70; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        updateAssetInfo();
        setInterval(updateAssetInfo, 10000);
    </script>
</body>
</html>
