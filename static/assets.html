<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | ASSETS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050b10;
            overflow-x: hidden;
            color: #cbd5e1;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        #bg-canvas {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }

        .glass-card {
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Стили новой навигации */
        .fixed-bottom-nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 480px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .nav-item a {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            color: #64748b;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-item.active a {
            color: #06b6d4;
            filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.5));
        }

        .nav-item span {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 4px;
            letter-spacing: 0.05em;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .animate-pulse-soft { animation: pulse-soft 3s infinite; }
    </style>
</head>
<body class="selection:bg-cyan-500/30">
    <canvas id="bg-canvas"></canvas>
    
    <header class="p-6 flex justify-between items-center relative z-50">
        <a href="index.html" class="flex items-center gap-2 group">
            <div class="relative">
                <div class="absolute inset-0 bg-cyan-500/20 blur-lg rounded-full animate-pulse"></div>
                <img src="images/logo.png" alt="Logo" class="w-10 h-10 relative z-10 brightness-110" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7038/7038131.png'">
            </div>
            <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">QUAN<span class="text-cyan-400">CORE</span></h1>
        </a>
        <div id="connectBtn" class="scale-90"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-40 relative z-10">
        <div class="glass-card p-8 rounded-[2.5rem] mb-8 relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                <svg class="w-24 h-24 text-cyan-400" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            
            <p class="text-[9px] text-cyan-400 font-black uppercase tracking-[0.4em] mb-2">Total Net Worth</p>
            <div class="flex items-baseline gap-2">
                <h2 class="text-5xl font-black text-white italic tracking-tighter" id="total-value">$0.00</h2>
                <span class="text-xs text-green-400 mono font-bold">+2.4%</span>
            </div>
            
            <div class="mt-6 h-1.5 w-full bg-white/5 rounded-full overflow-hidden flex">
                <div class="h-full bg-cyan-500 shadow-[0_0_10px_#06b6d4]" style="width: 65%"></div>
                <div class="h-full bg-purple-500" style="width: 25%"></div>
                <div class="h-full bg-slate-700" style="width: 10%"></div>
            </div>
            <div class="flex justify-between mt-3 mono text-[8px] uppercase tracking-widest text-slate-500">
                <span>TON 65%</span>
                <span>QUAN 25%</span>
                <span>OTHER 10%</span>
            </div>
        </div>

        <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 mb-4 px-2">Asset Distribution</h3>

        <div class="space-y-4">
            <div class="glass-card p-5 rounded-3xl flex justify-between items-center transition-all duration-500 hover:translate-x-1 hover:border-cyan-500/50">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-cyan-500/10 rounded-2xl flex items-center justify-center border border-cyan-500/20 shadow-[inset_0_0_15px_rgba(6,182,212,0.1)]">
                        <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                    </div>
                    <div>
                        <p class="font-black text-white text-sm tracking-tight uppercase">Toncoin</p>
                        <p class="text-[9px] text-slate-500 mono uppercase tracking-tighter">Native Protocol Asset</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-black text-white text-lg mono italic" id="asset-ton-bal">0.00</p>
                    <p class="text-[9px] text-cyan-500 font-bold mono" id="asset-ton-usd">~ $0.00</p>
                </div>
            </div>

            <div class="glass-card p-5 rounded-3xl flex justify-between items-center transition-all duration-500 hover:translate-x-1 hover:border-purple-500/50">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-purple-500/10 rounded-2xl flex items-center justify-center border border-purple-500/20">
                        <span class="text-purple-400 font-black italic text-xl">Q</span>
                    </div>
                    <div>
                        <p class="font-black text-white text-sm tracking-tight uppercase">Quantum</p>
                        <p class="text-[9px] text-slate-500 mono uppercase tracking-tighter">Utility Jetton V3</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-black text-white text-lg mono italic">450,000</p>
                    <p class="text-[9px] text-purple-500 font-bold mono uppercase">Staked</p>
                </div>
            </div>

            <div class="py-10 text-center relative">
                <div class="absolute inset-x-0 top-1/2 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent opacity-20"></div>
                <span class="relative z-10 bg-[#050b10] px-4 text-[8px] text-slate-600 uppercase tracking-[0.5em] mono animate-pulse-soft">Secure Data Link Active</span>
            </div>
        </div>
    </main>

    <nav class="fixed-bottom-nav">
        <div class="nav-item">
            <a href="index.html">
                <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>HOME</span>
            </a>
        </div>
        <div class="nav-item">
            <a href="swap.html">
                <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                <span>SWAP</span>
            </a>
        </div>
        <div class="nav-item">
            <a href="forge.html">
                <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                <span>FORGE</span>
            </a>
        </div>
        <div class="nav-item active">
            <a href="assets.html"> 
                <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                <span>DATA</span>
            </a>
        </div>
        <div class="nav-item">
            <a href="operator.html"> 
                <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span>OPERATOR</span>
            </a>
        </div>
    </nav>

    <script>
        // Инициализация TonConnect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        const TON_PRICE = 5.45;

        async function updateAssetInfo() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                if (data.balance) {
                    const tonBal = parseFloat(data.balance);
                    const tonInUsd = tonBal * TON_PRICE;
                    
                    document.getElementById('asset-ton-bal').innerText = tonBal.toFixed(2);
                    document.getElementById('asset-ton-usd').innerText = `~ $${tonInUsd.toFixed(2)}`;
                    
                    const totalValue = tonInUsd + 120.50;
                    document.getElementById('total-value').innerText = `$${totalValue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                }
            } catch (e) {
                console.warn("CORE_LINK_PENDING: API offline");
            }
        }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            parts = Array.from({length: 80}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 0.6 + 0.1,
                o: Math.random() * 0.3
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#06b6d4';
            parts.forEach(p => {
                p.y -= p.s;
                if(p.y < 0) p.y = canvas.height;
                ctx.globalAlpha = p.o;
                ctx.fillRect(p.x, p.y, 1.5, 1.5);
            });
            requestAnimationFrame(draw);
        }

        window.onresize = init;
        init();
        draw();
        
        updateAssetInfo();
        setInterval(updateAssetInfo, 10000);
    </script>
</body>
</html>
