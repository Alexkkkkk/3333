<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | HYPER OPERATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --neon: #06b6d4; --danger: #ef4444; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000205;
            color: #f8fafc;
            overflow-x: hidden;
            perspective: 1200px;
        }

        /* Квантовый шум на фоне */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 100;
        }

        .hyper-card {
            background: radial-gradient(circle at top left, rgba(6, 182, 212, 0.15), transparent 40%), 
                        linear-gradient(135deg, rgba(15, 23, 42, 0.8) 0%, rgba(2, 6, 23, 0.95) 100%);
            backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .asset-node {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .asset-node:active { transform: scale(0.96) rotateX(10deg); }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(6, 182, 212, 0.3);
            position: absolute;
            top: 0;
            box-shadow: 0 0 15px var(--neon);
            animation: moveScan 4s linear infinite;
            z-index: 20;
            pointer-events: none;
        }

        @keyframes moveScan {
            0% { top: -10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        .value-glow {
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.8);
            transition: all 0.3s ease;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: 0; filter: blur(1px); }

        /* Эффект загрузки нового поколения */
        .cyber-loader {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }
        .cyber-loader-bar {
            width: 40%;
            height: 100%;
            background: var(--neon);
            box-shadow: 0 0 10px var(--neon);
            animation: loading 2s infinite ease-in-out;
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }
    </style>
</head>
<body class="antialiased selection:bg-cyan-500/30">
    <canvas id="bg-canvas"></canvas>

    <header class="p-8 flex justify-between items-center relative z-50">
        <div class="flex items-center gap-4">
            <div class="relative group cursor-none">
                <div class="absolute inset-0 bg-cyan-500 rounded-full blur-3xl opacity-20 group-hover:opacity-60 transition-all duration-700"></div>
                <img src="/images/logo.png" alt="Logo" class="w-14 h-14 relative z-10 animate-[pulse_4s_infinite]">
            </div>
            <div>
                <h1 class="text-3xl font-black italic text-white uppercase tracking-tighter leading-none">HYPER<span class="text-cyan-400">CORE</span></h1>
                <div class="flex items-center gap-2 mt-2">
                    <div class="flex gap-1">
                        <span class="w-1 h-3 bg-cyan-500/40 rounded-full"></span>
                        <span class="w-1 h-3 bg-cyan-500/60 rounded-full animate-bounce"></span>
                        <span class="w-1 h-3 bg-cyan-400 rounded-full"></span>
                    </div>
                    <span class="text-[8px] font-mono text-cyan-500 tracking-widest uppercase opacity-70">Neural Protocol v5.0</span>
                </div>
            </div>
        </div>
        <div id="connectBtn" class="shadow-2xl shadow-cyan-500/20 hover:scale-105 transition-transform"></div>
    </header>

    <main class="max-w-lg mx-auto px-6 pb-44 relative z-10">
        
        <div class="hyper-card rounded-[3rem] p-8 mb-10 border border-white/10">
            <div class="scanline"></div>
            
            <div class="flex justify-between items-start mb-10">
                <div class="bg-black/40 p-4 rounded-3xl border border-white/5">
                    <p class="text-[9px] font-black text-cyan-500 uppercase tracking-widest mb-1">Status</p>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                        <span class="text-xs font-bold text-white uppercase italic" id="user-status">OPERATOR_IDLE</span>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Net Load</p>
                    <p class="text-xs font-mono text-white">0.0024ms</p>
                </div>
            </div>

            <div class="mb-8">
                <p class="text-[10px] text-center text-slate-500 font-bold uppercase tracking-[0.4em] mb-4">Secured Neural Access</p>
                <div class="bg-white/5 backdrop-blur-md rounded-2xl p-4 border border-white/10 group hover:border-cyan-500/50 transition-colors">
                    <p class="text-[11px] font-mono text-slate-300 break-all text-center leading-relaxed opacity-60 group-hover:opacity-100 transition-opacity" id="wallet-addr">
                        0x_AWAITING_LINK_SIGNAL
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="bg-black/20 rounded-2xl p-3 border border-white/5 text-center">
                    <p class="text-[8px] text-slate-600 uppercase font-black mb-1">Tier</p>
                    <p class="text-[10px] font-bold text-cyan-400 uppercase">Pro Elite</p>
                </div>
                <div class="bg-black/20 rounded-2xl p-3 border border-white/5 text-center">
                    <p class="text-[8px] text-slate-600 uppercase font-black mb-1">Uptime</p>
                    <p class="text-[10px] font-bold text-white uppercase" id="session-timer">00:00</p>
                </div>
                <div class="bg-black/20 rounded-2xl p-3 border border-white/5 text-center">
                    <p class="text-[8px] text-slate-600 uppercase font-black mb-1">Nodes</p>
                    <p class="text-[10px] font-bold text-green-400 uppercase">Active</p>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="flex justify-between items-end px-4">
                <div>
                    <h3 class="text-xl font-black text-white italic uppercase tracking-tighter">Liquid <span class="text-cyan-500">Assets</span></h3>
                    <div class="w-12 h-1 bg-cyan-500 mt-1 rounded-full"></div>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-mono text-cyan-500 font-bold" id="asset-count">0 UNITS FOUND</span>
                </div>
            </div>

            <div id="assets-container" class="space-y-4">
                <div class="hyper-card rounded-[2.5rem] p-10 opacity-20 text-center border-dashed border-2 border-white/10">
                    <p class="text-xs font-black text-slate-500 uppercase tracking-widest">Connect Wallet to Decrypt Vault</p>
                    <div class="cyber-loader"><div class="cyber-loader-bar"></div></div>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/60 backdrop-blur-3xl border border-white/10 p-2 rounded-[2.5rem] flex justify-between items-center z-50 shadow-2xl">
        <a href="index.html" class="w-14 h-14 flex items-center justify-center text-slate-500 hover:text-white transition-all hover:bg-white/5 rounded-full">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        </a>
        <a href="operator.html" class="w-16 h-16 bg-cyan-500 rounded-full flex items-center justify-center text-black shadow-[0_0_30px_rgba(6,182,212,0.5)] transform -translate-y-4 border-4 border-[#000205]">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </a>
        <a href="staking.html" class="w-14 h-14 flex items-center justify-center text-slate-500 hover:text-white transition-all hover:bg-white/5 rounded-full">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </a>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        let sessionSeconds = 0;
        setInterval(() => {
            sessionSeconds++;
            const m = Math.floor(sessionSeconds / 60).toString().padStart(2, '0');
            const s = (sessionSeconds % 60).toString().padStart(2, '0');
            document.getElementById('session-timer').innerText = `${m}:${s}`;
        }, 1000);

        async function updateUI(wallet) {
            const container = document.getElementById('assets-container');
            const status = document.getElementById('user-status');
            const addr = document.getElementById('wallet-addr');
            
            if (!wallet) {
                status.innerText = "OPERATOR_IDLE";
                status.style.color = "white";
                return;
            }

            status.innerText = "HYPER_CONNECTED";
            status.style.color = "#22d3ee";
            addr.innerText = wallet.account.address;

            // Fetch Data
            try {
                const response = await fetch(`https://tonapi.io/v2/accounts/${wallet.account.address}/jettons`);
                const data = await response.json();
                const jettons = data.balances || [];
                
                document.getElementById('asset-count').innerText = `${jettons.length + 1} CORE_UNITS`;

                let html = renderAssetCard('TON', 'The Open Network', (wallet.account.balance / 1e9).toFixed(2), 'https://ton.org/download/ton_symbol.png', true);
                
                jettons.forEach(j => {
                    const bal = (j.balance / Math.pow(10, j.jetton.decimals)).toFixed(2);
                    if (bal > 0) {
                        html += renderAssetCard(j.jetton.symbol, j.jetton.name, bal, j.jetton.image);
                    }
                });
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<p class="text-center text-red-500 font-mono">Sync Error: Link Unstable</p>`;
            }
        }

        function renderAssetCard(symbol, name, balance, img, isNative = false) {
            return `
                <div class="asset-node hyper-card rounded-[2.5rem] p-6 flex items-center justify-between group border-l-4 ${isNative ? 'border-l-cyan-500' : 'border-l-transparent'}">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 bg-black/40 rounded-2xl flex items-center justify-center border border-white/5 overflow-hidden">
                            <img src="${img || '/images/logo.png'}" class="w-full h-full object-cover" onerror="this.src='/images/logo.png'">
                        </div>
                        <div>
                            <p class="text-white font-black italic text-lg leading-none uppercase">${symbol}</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">${name}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black text-white italic value-glow tracking-tighter">${balance}</p>
                        <p class="text-[8px] text-cyan-500/40 font-bold uppercase mt-1">Confirmed Hash</p>
                    </div>
                </div>
            `;
        }

        tonConnectUI.onStatusChange(wallet => updateUI(wallet));

        // Background Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            lines = Array.from({length: 40}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                v: Math.random() * 0.5 + 0.2,
                l: Math.random() * 100 + 50
            }));
        }

        function draw() {
            ctx.fillStyle = '#000205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(6, 182, 212, 0.15)';
            ctx.lineWidth = 1;

            lines.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(line.x, line.y);
                ctx.lineTo(line.x, line.y + line.l);
                ctx.stroke();
                line.y -= line.v;
                if (line.y + line.l < 0) line.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
