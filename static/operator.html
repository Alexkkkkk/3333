<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPERATOR | LEDGER CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --neon: #06b6d4; --neural-bg: #010409; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--neural-bg);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .ledger-card {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }

        .ledger-card:hover {
            border-color: rgba(6, 182, 212, 0.3);
            background: rgba(15, 23, 42, 0.5);
        }

        #bg-glow {
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% -20%, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .loading-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .3; }
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">
    <div id="bg-glow"></div>

    <header class="p-6 flex justify-between items-center relative z-50 max-w-2xl mx-auto w-full">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 border border-cyan-500/30 rounded-full flex items-center justify-center bg-cyan-500/5">
                <img src="/images/logo.png" class="w-6 h-6 opacity-80" alt="L">
            </div>
            <h1 class="text-xl font-black tracking-tighter uppercase italic">Ledger_<span class="text-cyan-500">View</span></h1>
        </div>
        <div id="connectBtn" class="scale-90"></div>
    </header>

    <main class="max-w-2xl mx-auto px-6 pb-40 relative z-10">
        
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="ledger-card rounded-3xl p-5 border-t border-white/5">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Asset Count</p>
                <p class="text-2xl font-black italic value-glow" id="stat-count">--</p>
            </div>
            <div class="ledger-card rounded-3xl p-5 border-t border-white/5">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Network Status</p>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse"></span>
                    <p class="text-xs font-bold uppercase tracking-tight">Mainnet_Active</p>
                </div>
            </div>
        </div>

        <div class="space-y-3" id="ledger-container">
            <div class="p-20 text-center opacity-20">
                <div class="w-12 h-12 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-xs font-black uppercase tracking-[0.5em]">Initializing Scan...</p>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-black/60 backdrop-blur-2xl border border-white/5 p-3 rounded-[2.5rem] flex justify-between items-center z-50 shadow-2xl">
        <a href="index.html" class="w-12 h-12 flex items-center justify-center text-slate-500 hover:text-cyan-400 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        </a>
        <a href="operator.html" class="w-14 h-14 bg-cyan-500 text-black rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(6,182,212,0.4)]">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0z"/><path d="M12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </a>
        <a href="staking.html" class="w-12 h-12 flex items-center justify-center text-slate-500 hover:text-cyan-400 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </a>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        async function updateLedger(wallet) {
            const container = document.getElementById('ledger-container');
            const countDisplay = document.getElementById('stat-count');

            if (!wallet) {
                container.innerHTML = `
                    <div class="ledger-card rounded-[2.5rem] p-12 text-center border-dashed border-2 border-white/5">
                        <p class="text-[10px] font-black text-slate-600 uppercase tracking-[0.4em]">Handshake Required</p>
                    </div>
                `;
                countDisplay.innerText = "00";
                return;
            }

            try {
                const response = await fetch(`https://tonapi.io/v2/accounts/${wallet.account.address}/jettons`);
                const data = await response.json();
                const jettons = data.balances || [];
                
                let html = '';
                let totalAssets = 0;

                // 1. Render TON (Native)
                const tonBalance = (wallet.account.balance / 1e9).toFixed(3);
                html += renderCoinRow('TON', 'The Open Network', tonBalance, 'https://ton.org/download/ton_symbol.png');
                totalAssets++;

                // 2. Render Jettons
                jettons.forEach(j => {
                    const bal = (j.balance / Math.pow(10, j.jetton.decimals)).toFixed(2);
                    if (bal > 0) {
                        html += renderCoinRow(j.jetton.symbol, j.jetton.name, bal, j.jetton.image);
                        totalAssets++;
                    }
                });

                container.innerHTML = html;
                countDisplay.innerText = totalAssets.toString().padStart(2, '0');

            } catch (e) {
                container.innerHTML = `<p class="p-10 text-center text-red-500 font-mono text-xs uppercase">Terminal_Sync_Error</p>`;
            }
        }

        function renderCoinRow(symbol, name, balance, img) {
            return `
                <div class="ledger-card rounded-3xl p-4 flex items-center justify-between group animate-[fadeIn_0.5s_ease-out]">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-black/40 border border-white/5 overflow-hidden flex-shrink-0">
                            <img src="${img || '/images/logo.png'}" class="w-full h-full object-cover" onerror="this.src='/images/logo.png'">
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="text-white font-bold tracking-tight leading-none uppercase truncate w-24">${symbol}</h3>
                            <p class="text-[9px] text-slate-500 font-bold uppercase mt-1 truncate w-32">${name}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black italic text-white tracking-tighter">${balance}</p>
                        <p class="text-[8px] text-cyan-500/50 font-black uppercase">Confirmed</p>
                    </div>
                </div>
            `;
        }

        tonConnectUI.onStatusChange(wallet => updateLedger(wallet));
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
