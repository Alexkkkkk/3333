<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | OPERATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050b10] text-slate-300">
    <canvas id="bg-canvas"></canvas>
    
    <header class="p-6 flex justify-between items-center relative z-50">
        <a href="index.html" class="flex items-center gap-2">
            <img src="/images/logo.png" alt="Logo" class="w-10 h-10">
            <h1 class="text-xl font-black italic text-white uppercase">QUAN<span class="text-cyan-400">CORE</span></h1>
        </a>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-32 relative z-10">
        <div class="glass-card mb-4 border-l-4 border-l-cyan-500 bg-white/5 p-5 rounded-r-3xl backdrop-blur-md">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-full flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </div>
                <div>
                    <h2 class="font-black italic text-white uppercase tracking-tight">Operator Profile</h2>
                    <p class="text-[10px] font-mono text-cyan-400/70 tracking-widest uppercase" id="wallet-address-display">Not Connected</p>
                </div>
            </div>
        </div>

        <div class="bg-black/40 border border-white/5 rounded-[2.5rem] p-6 mb-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-white italic">ASSETS MONITOR</h3>
                <div id="loading-status" class="hidden animate-spin w-4 h-4 border-2 border-cyan-500 border-t-transparent rounded-full"></div>
            </div>
            
            <div id="assets-container" class="space-y-3">
                <p class="text-[10px] text-slate-500 text-center py-8 uppercase tracking-widest">Connect wallet to scan assets...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <p class="text-[8px] text-slate-500 font-black uppercase mb-1">Total Yield</p>
                <p class="text-sm font-black text-green-400 italic">+0.00 QC</p>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <p class="text-[8px] text-slate-500 font-black uppercase mb-1">Node Status</p>
                <p class="text-[10px] font-black text-cyan-400 italic">ACTIVE NL5</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/60 backdrop-blur-2xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-bold uppercase">Home</span>
        </a>
        <a href="swap.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="text-[9px] font-bold uppercase">Swap</span>
        </a>
        <a href="forge.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            <span class="text-[9px] font-bold uppercase">Forge</span>
        </a>
        <a href="assets.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[9px] font-bold uppercase">Data</span>
        </a>
        <a href="operator.html" class="flex flex-col items-center text-cyan-400 transition-all">
            <svg class="w-6 h-6 mb-1 scale-110" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-bold uppercase">Operator</span>
        </a>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        // Функция для получения и отображения монет
        async function fetchWalletAssets(address) {
            const container = document.getElementById('assets-container');
            const loader = document.getElementById('loading-status');
            loader.classList.remove('hidden');

            try {
                // Используем публичный API TON для получения жетонов
                const response = await fetch(`https://tonapi.io/v2/accounts/${address}/jettons`);
                const data = await response.json();
                
                container.innerHTML = ''; // Очистка

                if (data.balances && data.balances.length > 0) {
                    data.balances.forEach(item => {
                        const jetton = item.jetton;
                        const balance = (parseInt(item.balance) / Math.pow(10, jetton.decimals)).toLocaleString();
                        
                        const assetHtml = `
                            <div class="bg-white/5 border border-white/5 p-4 rounded-2xl flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    <img src="${jetton.image || ''}" class="w-8 h-8 rounded-full bg-cyan-500/20" onerror="this.src='https://wallet.ton.org/assets/img/ton_logo.svg'">
                                    <div>
                                        <p class="font-bold text-white leading-none">${jetton.symbol}</p>
                                        <p class="text-[9px] text-slate-500 uppercase mt-1">${jetton.name}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="font-black text-white italic">${balance}</p>
                                    <p class="text-[9px] text-cyan-400 font-bold uppercase">Jetton</p>
                                </div>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', assetHtml);
                    });
                } else {
                    container.innerHTML = '<p class="text-[10px] text-slate-500 text-center py-8">No Jettons found in this wallet.</p>';
                }
            } catch (error) {
                console.error("Asset fetch error:", error);
                container.innerHTML = '<p class="text-[10px] text-red-500 text-center py-8">Sync Error: Failed to load assets</p>';
            } finally {
                loader.classList.add('hidden');
            }
        }

        tonConnectUI.onStatusChange(wallet => {
            const display = document.getElementById('wallet-address-display');
            if (wallet) {
                const addr = wallet.account.address;
                display.innerText = addr.slice(0, 8).toUpperCase() + '...' + addr.slice(-8).toUpperCase();
                fetchWalletAssets(addr); // Загружаем монеты при подключении
            } else {
                display.innerText = "NOT CONNECTED";
                document.getElementById('assets-container').innerHTML = '<p class="text-[10px] text-slate-500 text-center py-8 uppercase tracking-widest">Connect wallet to scan assets...</p>';
            }
        });

        // Canvas Particles (Standard Core Background)
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.speed = Math.random() * 0.4 + 0.1;
                    this.opacity = Math.random() * 0.2;
                }
                update() { this.y -= this.speed; if (this.y < 0) this.y = canvas.height; }
                draw() { ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`; ctx.fillRect(this.x, this.y, 1, 1); }
            }
            for(let i=0; i<70; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
