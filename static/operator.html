<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM OPERATOR | QUANCORE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-deep: #0062ff;
            --bg: #010409;
            --glass: rgba(13, 17, 23, 0.8);
            --border: rgba(0, 242, 255, 0.12);
            --card: #0d1117;
        }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: 
                radial-gradient(circle at 50% -20%, #003a5f 0%, #010409 70%),
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            margin: 0;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 28px;
        }

        .btn-quantum {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            color: black;
            font-weight: 800;
        }

        .profile-badge {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 4px 12px;
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent);
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <header class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center relative z-50">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <img src="images/logo.png" alt="Logo" class="w-10 h-10 object-contain">
            <h1 class="text-xl font-black tracking-tighter uppercase italic text-white">QUAN<span class="text-cyan-400">CORE</span></h1>
        </div>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-xl mx-auto px-4 pt-10">
        <div class="glass-card p-8">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center border-2 border-white/10 shadow-lg shadow-cyan-500/20">
                    <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/>
                    </svg>
                </div>
                <div>
                    <h2 class="font-black italic text-white uppercase text-2xl leading-none">System Operator</h2>
                    <p class="text-slate-500 text-xs mt-1 uppercase tracking-widest">Interface v4.1</p>
                </div>
            </div>

            <div id="profile-wallet-info" class="hidden space-y-6">
                <div class="bg-white/5 p-5 rounded-2xl border border-white/10 relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-[9px] text-slate-500 uppercase font-bold mb-2 tracking-widest">Active Wallet Address</p>
                        <p class="text-[12px] font-mono text-cyan-400 break-all leading-relaxed bg-black/30 p-3 rounded-lg border border-cyan-500/10" id="profile-full-address">
                            Checking...
                        </p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-[9px] text-slate-500 uppercase font-bold">Network</p>
                        <p class="text-sm font-bold text-white">TON Mainnet</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-[9px] text-slate-500 uppercase font-bold">Status</p>
                        <p class="text-sm font-bold text-emerald-400">Verified</p>
                    </div>
                </div>

                <button onclick="tonConnectUI.disconnect()" class="w-full py-4 rounded-2xl bg-red-500/10 text-red-400 font-bold border border-red-500/20 text-xs uppercase tracking-widest hover:bg-red-500/20 transition-all">
                    Disconnect Terminal
                </button>
            </div>

            <div id="profile-connect-prompt" class="py-12 text-center border-2 border-dashed border-white/5 rounded-3xl">
                <p class="text-slate-400 text-sm mb-6 px-6">Terminal access requires a secure connection to your TON wallet.</p>
                <button onclick="tonConnectUI.connectWallet()" class="btn-quantum px-10 py-4 rounded-2xl text-xs uppercase italic tracking-widest">
                    Initialize Sync
                </button>
            </div>
        </div>
    </main>

    <script>
        // Инициализация TonConnect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        tonConnectUI.onStatusChange(wallet => {
            const infoBox = document.getElementById('profile-wallet-info');
            const promptBox = document.getElementById('profile-connect-prompt');
            const addrEl = document.getElementById('profile-full-address');

            if (wallet) {
                infoBox.classList.remove('hidden');
                promptBox.classList.add('hidden');
                addrEl.innerText = wallet.account.address;
            } else {
                infoBox.classList.add('hidden');
                promptBox.classList.remove('hidden');
            }
        });

        // Частицы фона (как в index.html)
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];
        window.onresize = () => { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; };
        window.onresize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height;
                this.speed = Math.random() * 0.5 + 0.2;
                this.opacity = Math.random() * 0.5;
            }
            update() { this.y -= this.speed; if (this.y < 0) this.reset(); }
            draw() { bgCtx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`; bgCtx.fillRect(this.x, this.y, 1, 1); }
        }
        for(let i=0; i<60; i++) particles.push(new Particle());
        function animate() { bgCtx.clearRect(0,0,bgCanvas.width, bgCanvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
