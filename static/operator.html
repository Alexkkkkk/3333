<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | OPERATOR LEDGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --cyan: #06b6d4; 
            --glass: rgba(10, 20, 30, 0.6);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #010409;
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Голографическая сетка фона */
        .hologram-grid {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center top;
            opacity: 0.2; z-index: 1;
        }

        .ledger-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Линия сканирования */
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 15px var(--cyan);
            top: -2px; left: 0; opacity: 0; pointer-events: none;
        }
        .ledger-card:hover .scan-line {
            animation: scan-loop 2s infinite linear;
            opacity: 0.5;
        }
        @keyframes scan-loop { 0% { top: 0%; } 100% { top: 100%; } }

        /* Навигационная панель */
        .fixed-bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 2rem;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .nav-item a {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-item span {
            font-size: 8px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .nav-item.active a {
            color: var(--cyan);
            filter: drop-shadow(0 0 8px var(--cyan));
        }

        .nav-icon { width: 22px; height: 22px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Скрытие скроллбара */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">
    <div class="hologram-grid"></div>

    <header class="p-6 flex justify-between items-center relative z-50 max-w-2xl mx-auto w-full">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 border border-cyan-500/30 rounded-full flex items-center justify-center bg-cyan-500/5">
                <img src="images/logo.png" class="w-6 h-6" alt="L" onerror="this.style.display='none'">
            </div>
            <h1 class="text-xl font-black tracking-tighter uppercase italic">Ledger_<span class="text-cyan-500">View</span></h1>
        </div>
        <div id="connectBtn" class="scale-90"></div>
    </header>

    <main class="max-w-2xl mx-auto px-6 pb-40 relative z-10">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="ledger-card rounded-3xl p-6">
                <div class="scan-line"></div>
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Assets</p>
                <p class="text-3xl font-black italic text-white" id="stat-count">00</p>
            </div>
            <div class="ledger-card rounded-3xl p-6">
                <div class="scan-line"></div>
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Terminal Status</p>
                <div class="flex items-center gap-2 mt-2" id="status-container">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse" id="status-indicator"></span>
                    <p class="text-[10px] font-bold uppercase text-green-400" id="status-text">Online</p>
                </div>
            </div>
        </div>

        <div class="space-y-4" id="ledger-container">
            <div class="p-20 text-center opacity-40">
                <div class="w-8 h-8 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-[8px] font-black uppercase tracking-[0.5em]">Scanning Blockchain...</p>
            </div>
        </div>
    </main>

    <nav class="fixed-bottom-nav">
        <div class="nav-item">
            <a href="index.html">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                <span>HOME</span>
            </a>
        </div>
        <div class="nav-item">
            <a href="swap.html">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                <span>SWAP</span>
            </a>
        </div>
        <div class="nav-item">
            <a href="staking.html">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                <span>FORGE</span>
            </a>
        </div>
        <div class="nav-item">
            <a href="assets.html">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                <span>DATA</span>
            </a>
        </div>
        <div class="nav-item active">
            <a href="operator.html">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <span>OPERATOR</span>
            </a>
        </div>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        async function updateLedger(wallet) {
            const container = document.getElementById('ledger-container');
            const countDisplay = document.getElementById('stat-count');
            const statusInd = document.getElementById('status-indicator');
            const statusTxt = document.getElementById('status-text');

            if (!wallet || !wallet.account) {
                container.innerHTML = `<div class="ledger-card rounded-3xl p-10 text-center opacity-50 font-bold uppercase text-[10px]">Awaiting Handshake</div>`;
                countDisplay.innerText = "00";
                statusInd.className = "w-2 h-2 bg-yellow-500 rounded-full animate-pulse";
                statusTxt.innerText = "Standby";
                statusTxt.className = "text-[10px] font-bold uppercase text-yellow-500";
                return;
            }

            try {
                // Статус: Online
                statusInd.className = "w-2 h-2 bg-green-500 rounded-full animate-pulse";
                statusTxt.innerText = "Online";
                statusTxt.className = "text-[10px] font-bold uppercase text-green-400";

                // 1. Получаем основной баланс TON
                const accRes = await fetch(`https://tonapi.io/v2/accounts/${wallet.account.address}`);
                const accData = await accRes.json();
                const tonBalance = (accData.balance / 1e9).toFixed(2);

                // 2. Получаем жетоны
                const jettonRes = await fetch(`https://tonapi.io/v2/accounts/${wallet.account.address}/jettons`);
                const jettonData = await jettonRes.json();
                const jettons = jettonData.balances || [];
                
                let html = '';
                let totalAssets = 0;

                // Рендерим TON
                html += renderCoinRow('TON', 'Native Token', tonBalance, 'https://ton.org/download/ton_symbol.png');
                totalAssets++;

                // Рендерим Жетоны
                jettons.forEach(j => {
                    const bal = (j.balance / Math.pow(10, j.jetton.decimals)).toFixed(2);
                    if (parseFloat(bal) > 0) {
                        html += renderCoinRow(j.jetton.symbol, j.jetton.name, bal, j.jetton.image);
                        totalAssets++;
                    }
                });

                container.innerHTML = html;
                countDisplay.innerText = totalAssets.toString().padStart(2, '0');
            } catch (e) {
                console.error(e);
                container.innerHTML = `<div class="p-10 text-center text-red-500 text-[10px] uppercase font-bold">Protocol Sync Error</div>`;
            }
        }

        function renderCoinRow(symbol, name, balance, img) {
            return `
                <div class="ledger-card rounded-3xl p-5 flex items-center justify-between animate-fade-in mb-3">
                    <div class="scan-line"></div>
                    <div class="flex items-center gap-4">
                        <img src="${img || 'images/logo.png'}" 
                             class="w-10 h-10 rounded-full bg-black/20 object-cover" 
                             onerror="this.src='images/logo.png'">
                        <div>
                            <h3 class="text-white font-black italic uppercase leading-none text-sm">${symbol}</h3>
                            <p class="text-[8px] text-cyan-500/60 font-bold uppercase mt-1">${name.substring(0, 15)}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black italic text-white">${balance}</p>
                        <p class="text-[7px] text-green-500 font-black uppercase">Active</p>
                    </div>
                </div>
            `;
        }

        tonConnectUI.onStatusChange(wallet => updateLedger(wallet));
        
        // Первичная проверка при загрузке
        if(tonConnectUI.account) {
            updateLedger({ account: tonConnectUI.account });
        } else {
            updateLedger(null);
        }
    </script>
</body>
</html>
