<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | ULTRA SWAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #7000ff;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: #050b10; 
            overflow-x: hidden; 
            color: #94a3b8; 
        }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.4), rgba(2, 6, 23, 0.6));
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        
        .terminal-scroll::-webkit-scrollbar { width: 2px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.2); }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='M6 9l6 6 6-6'%3e%3c/path%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 0.8em;
            padding-right: 1.8rem !important;
        }
        
        option { background: #0f172a; color: white; }

        .btn-glow {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }
        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        .chart-wrapper {
            position: relative;
            height: 160px;
            width: 100%;
            overflow: hidden;
            border-radius: 1rem;
            margin-top: 8px;
        }
    </style>
</head>
<body class="antialiased">
    <canvas id="bg-canvas"></canvas>

    <header class="p-6 flex justify-between items-center relative z-50 max-w-4xl mx-auto">
        <a href="index.html" class="flex items-center gap-2 group">
            <div class="relative">
                <div class="absolute inset-0 bg-cyan-500 blur-lg opacity-20 group-hover:opacity-40 transition-opacity"></div>
                <img src="/images/logo.png" alt="Logo" class="w-10 h-10 relative z-10" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7038/7038131.png'">
            </div>
            <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">QUAN<span class="text-cyan-400">CORE</span></h1>
        </a>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-32 relative z-10">
        <div class="glass-card rounded-3xl p-4 mb-4 overflow-hidden relative border border-white/5">
            <div class="flex justify-between items-center px-1 mb-2">
                <div class="flex items-center gap-2">
                    <span class="text-[9px] font-black uppercase text-slate-500 tracking-[0.2em]">Quantum Oracle V4.2</span>
                    <div class="flex items-center gap-1">
                        <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-[8px] font-bold text-green-500 uppercase">Live</span>
                    </div>
                </div>
            </div>
            
            <div class="chart-wrapper" id="tradingview_chart">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                      "symbols": [["OKX:TONUSDT|12M"]],
                      "chartOnly": true,
                      "width": "100%",
                      "height": "100%",
                      "locale": "ru",
                      "colorTheme": "dark",
                      "autosize": true,
                      "showVolume": false,
                      "hideDateRanges": false,
                      "scalePosition": "none",
                      "scaleMode": "Normal",
                      "fontFamily": "JetBrains Mono, monospace",
                      "fontSize": "10",
                      "valuesTracking": "1",
                      "changeMode": "price-and-percent",
                      "chartType": "area",
                      "backgroundColor": "rgba(5, 11, 16, 0)",
                      "lineWidth": 2,
                      "lineColor": "#00f2ff",
                      "topColor": "rgba(0, 242, 255, 0.15)",
                      "bottomColor": "rgba(0, 242, 255, 0)",
                      "container_id": "tradingview_chart"
                    }
                    </script>
                </div>
            </div>
        </div>

        <div class="glass-card p-6 rounded-[32px] shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black italic text-white uppercase tracking-wider text-lg">SWAP TERMINAL</h2>
                <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-xl border border-white/5">
                    <span class="text-[8px] font-bold text-slate-500 uppercase">Slippage</span>
                    <select id="slipSelect" class="bg-transparent text-[10px] font-bold text-cyan-400 outline-none cursor-pointer">
                        <option value="0.1">0.1%</option>
                        <option value="0.5" selected>0.5%</option>
                        <option value="1.0">1.0%</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2 relative">
                <div class="bg-black/40 p-5 rounded-3xl border border-white/5 focus-within:border-cyan-500/40 transition-all">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Pay</span>
                        <button onclick="setMax()" class="text-[10px] text-cyan-500 font-black hover:text-cyan-300 transition-colors">MAX: <span id="balDisplay" class="mono">0.00</span></button>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="number" id="amtIn" oninput="calculate()" placeholder="0.0" class="bg-transparent text-3xl font-black outline-none w-full text-white placeholder:text-white/5">
                        <select id="tokenIn" onchange="updateTokens()" class="bg-white/5 text-sm text-white font-black italic px-3 py-1.5 rounded-xl border border-white/5 min-w-[90px] outline-none cursor-pointer hover:bg-white/10 transition-all">
                            <option value="TON">TON</option>
                            <option value="USDT">USDT</option>
                            <option value="NOT">NOT</option>
                            <option value="DOGS">DOGS</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-center -my-4 relative z-20">
                    <button class="bg-cyan-500 p-3 rounded-2xl shadow-lg shadow-cyan-500/20 hover:scale-110 active:scale-90 transition-all border-4 border-[#050b10] group">
                        <svg class="w-5 h-5 text-black group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                            <path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                        </svg>
                    </button>
                </div>

                <div class="bg-black/40 p-5 rounded-3xl border border-white/5">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Receive (QC)</span>
                        <span id="impact" class="text-[9px] text-green-500 font-bold mono">IMPACT < 0.01%</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="number" id="amtOut" readonly placeholder="0.0" class="bg-transparent text-3xl font-black outline-none w-full text-cyan-400 placeholder:text-cyan-400/10">
                        <div class="bg-white/5 text-sm text-white font-black italic px-4 py-1.5 rounded-xl border border-white/5">QC</div>
                    </div>
                </div>

                <div class="px-2 pt-4 flex justify-between items-center border-t border-white/5 mt-4">
                    <div class="flex flex-col">
                        <span class="text-[8px] text-slate-500 uppercase font-black">Exchange Rate</span>
                        <span id="rateLabel" class="text-[10px] text-white font-bold mono">Loading...</span>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[8px] text-slate-500 uppercase font-black">Network Fee</span>
                        <span id="gasLabel" class="text-[10px] text-cyan-500 font-bold mono">~0.012 TON</span>
                    </div>
                </div>

                <button id="actionBtn" onclick="handleSwap()" class="w-full mt-4 bg-cyan-500 hover:bg-cyan-400 disabled:opacity-30 disabled:grayscale text-black font-black py-5 rounded-2xl transition-all active:scale-[0.98] uppercase tracking-[0.2em] text-xs btn-glow">
                    Connect Wallet
                </button>
            </div>
        </div>

        <div class="mt-4 glass-card rounded-2xl p-4 border border-white/5">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-black text-white uppercase tracking-tighter">Node Console</span>
            </div>
            <div id="terminal" class="terminal-scroll h-24 overflow-y-auto font-mono text-[9px] space-y-1 opacity-60">
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-2xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-5 h-5 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[8px] font-bold">HOME</span>
        </a>
        <a href="swap.html" class="flex flex-col items-center text-cyan-400">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="text-[8px] font-bold">SWAP</span>
        </a>
        <a href="forge.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            <span class="text-[8px] font-bold">FORGE</span>
        </a>
        <a href="assets.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[8px] font-bold">DATA</span>
        </a>
        <a href="operator.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[8px] font-bold">OPERATOR</span>
        </a>
    </nav>

    <script>
        let COIN_DATA = {
            'TON':   { price: 5.40,    balance: 0.00, decimals: 9, contract: null },
            'QC':    { price: 0.012,   balance: 0.00, decimals: 9, contract: null }, 
            'USDT':  { price: 1.00,    balance: 0.00, decimals: 6, contract: "EQCxE6mUtVrWicH-epZK_9X9u6S8F6B-3T31N8M460-S-T-X" },
            'NOT':   { price: 0.007,   balance: 0.00, decimals: 9, contract: "EQAvlW4Al6ElSokP4CAov-966no6878_h6Yv3Kx827N_M-N_" },
            'DOGS':  { price: 0.0006,  balance: 0.00, decimals: 9, contract: "EQ_7N_5v7WnZ7U5_nJzR7R9U9U9U9U9U9U9U9U9U9U9U9U9U" }
        };

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        const state = {
            wallet: null,
            receiver: "UQBo0iou1BlB_8Xg0Hn_rUeIcrpyyhoboIauvnii889OFRoI",
            isFetching: false
        };

        const ui = {
            in: document.getElementById('amtIn'),
            out: document.getElementById('amtOut'),
            tIn: document.getElementById('tokenIn'),
            btn: document.getElementById('actionBtn'),
            bal: document.getElementById('balDisplay'),
            rate: document.getElementById('rateLabel'),
            terminal: document.getElementById('terminal'),
            impact: document.getElementById('impact')
        };

        async function updateMarketPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network,tether,notcoin,dogs&vs_currencies=usd');
                const data = await response.json();
                COIN_DATA['TON'].price = data['the-open-network']?.usd || COIN_DATA['TON'].price;
                COIN_DATA['USDT'].price = data['tether']?.usd || 1.00;
                COIN_DATA['NOT'].price = data['notcoin']?.usd || COIN_DATA['NOT'].price;
                COIN_DATA['DOGS'].price = data['dogs']?.usd || COIN_DATA['DOGS'].price;
                calculate();
            } catch (e) { console.log("Oracle: Offline"); }
        }

        async function fetchBalances() {
            if (!state.wallet || state.isFetching) return;
            state.isFetching = true;
            try {
                const address = state.wallet.account.address;
                const tonRes = await fetch(`https://toncenter.com/api/v2/getAddressBalance?address=${address}`);
                const tonData = await tonRes.json();
                if (tonData.ok) COIN_DATA['TON'].balance = Number(tonData.result) / 1e9;
                log(`Synced: ${COIN_DATA['TON'].balance.toFixed(2)} TON`, 'cyan-500');
            } catch (e) { log("Balance sync failed", "red-500"); }
            finally { state.isFetching = false; updateUI(); }
        }

        function log(msg, color = 'slate-500') {
            const p = document.createElement('p');
            p.className = `text-${color}`;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            p.innerText = `[${time}] > ${msg}`;
            ui.terminal.prepend(p);
        }

        function updateUI() {
            const sym = ui.tIn.value;
            ui.bal.innerText = COIN_DATA[sym].balance.toLocaleString(undefined, {maximumFractionDigits: 4});
            calculate();
        }

        function calculate() {
            const symIn = ui.tIn.value;
            const valIn = parseFloat(ui.in.value) || 0;
            const exchangeRate = COIN_DATA[symIn].price / COIN_DATA['QC'].price;
            const res = valIn * exchangeRate;
            ui.out.value = valIn > 0 ? res.toFixed(2) : "";
            ui.rate.innerText = `1 ${symIn} ≈ ${exchangeRate.toFixed(4)} QC`;
            checkBtn();
        }

        function updateTokens() { updateUI(); }

        function setMax() {
            let amount = COIN_DATA[ui.tIn.value].balance;
            if(ui.tIn.value === 'TON') amount = Math.max(0, amount - 0.06); 
            ui.in.value = amount > 0 ? amount.toFixed(4) : 0;
            calculate();
        }

        function checkBtn() {
            if(!state.wallet) { ui.btn.innerText = "Connect Wallet"; ui.btn.disabled = false; return; }
            const val = parseFloat(ui.in.value) || 0;
            if(val <= 0) { ui.btn.innerText = "Enter Amount"; ui.btn.disabled = true; }
            else { ui.btn.innerText = `Swap ${ui.tIn.value} to QC`; ui.btn.disabled = false; }
        }

        async function handleSwap() {
            if(!state.wallet) { await tonConnectUI.openModal(); return; }
            
            const amountIn = parseFloat(ui.in.value);
            if (!amountIn || amountIn <= 0) {
                log("Введите корректную сумму", "red-400");
                return;
            }

            if (ui.tIn.value !== 'TON') {
                log("Своп токенов в разработке. Доступен только TON.", "yellow-500");
                return;
            }

            log("Инициализация моста...", "cyan-400");

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 360,
                messages: [
                    {
                        address: state.receiver,
                        amount: (amountIn * 1e9).toFixed(0), 
                    }
                ]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                log("Протокол подтвержден. Ожидание сети...", "green-400");
            } catch (e) {
                log("Ошибка транзакции или отказ", "red-500");
            }
        }

        tonConnectUI.onStatusChange(async (w) => {
            state.wallet = w;
            if(w) { 
                log("Node Linked", "green-400"); 
                await fetchBalances(); 
            } else { 
                log("Node Disconnected", "red-400"); 
            }
        });

        window.onload = () => {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let pts = [];
            const setup = () => {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                pts = Array.from({length: 40}, () => ({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    s: Math.random() * 2, v: Math.random() * 0.3 + 0.1
                }));
            };
            const draw = () => {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = "rgba(0, 242, 255, 0.1)";
                pts.forEach(p => {
                    ctx.fillRect(p.x, p.y, p.s, p.s);
                    p.y -= p.v; if(p.y < 0) p.y = canvas.height;
                });
                requestAnimationFrame(draw);
            };
            window.onresize = setup; setup(); draw();
            updateMarketPrices();
            log("Core Terminal Active", "cyan-500");
        };
    </script>
</body>
</html>
