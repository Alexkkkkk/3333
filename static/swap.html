<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | SWAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050b10] text-slate-300">
    <canvas id="bg-canvas"></canvas>
    
    <header class="p-6 flex justify-between items-center relative z-50">
        <a href="index.html" class="flex items-center gap-2">
            <img src="/images/logo.png" alt="Logo" class="w-10 h-10">
            <h1 class="text-xl font-black italic text-white uppercase">QUAN<span class="text-cyan-400">CORE</span></h1>
        </a>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-32 relative z-10">
        <div class="glass-card p-6 bg-gradient-to-br from-cyan-500/5 to-transparent rounded-3xl border border-white/10 backdrop-blur-md shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black italic text-white uppercase tracking-wider text-xl">SWAP TERMINAL</h2>
                <span class="text-[9px] bg-cyan-500/20 text-cyan-400 px-2 py-1 rounded-md border border-cyan-500/30">V.2.4 LIVE</span>
            </div>

            <div class="space-y-2">
                <div class="bg-black/40 p-5 rounded-3xl border border-white/5 focus-within:border-cyan-500/40 transition-all">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">You Pay</span>
                        <div class="flex items-center gap-1 bg-white/5 px-2 py-1 rounded-lg border border-white/5">
                            <div class="w-3 h-3 bg-cyan-500 rounded-full"></div>
                            <span class="text-[10px] text-white font-bold">TON</span>
                        </div>
                    </div>
                    <input type="number" id="swapInput" oninput="document.getElementById('swapOutput').value = (this.value * 450).toFixed(2)" placeholder="0.0" class="bg-transparent text-3xl font-black outline-none w-full text-white placeholder:text-white/10">
                </div>

                <div class="flex justify-center -my-4 relative z-20">
                    <div class="bg-cyan-500 p-2.5 rounded-2xl shadow-lg shadow-cyan-500/20 transform hover:rotate-180 transition-transform duration-500 cursor-pointer border-2 border-[#050b10]">
                        <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                            <path d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                        </svg>
                    </div>
                </div>

                <div class="bg-black/40 p-5 rounded-3xl border border-white/5 focus-within:border-cyan-500/40 transition-all">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">You Receive</span>
                        <div class="flex items-center gap-1 bg-white/5 px-2 py-1 rounded-lg border border-white/5">
                            <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
                            <span class="text-[10px] text-white font-bold">QC</span>
                        </div>
                    </div>
                    <input type="number" id="swapOutput" readonly placeholder="0.0" class="bg-transparent text-3xl font-black outline-none w-full text-cyan-400 placeholder:text-cyan-400/10">
                </div>

                <div class="px-2 pt-4 flex justify-between items-center">
                    <span class="text-[9px] text-slate-500 uppercase font-bold">Exchange Rate</span>
                    <span class="text-[9px] text-cyan-500 font-bold">1 TON ≈ 450.00 QC</span>
                </div>

                <button onclick="handleSwap()" class="w-full mt-4 bg-cyan-500 hover:bg-cyan-400 text-black font-black py-5 rounded-2xl transition-all active:scale-[0.98] uppercase tracking-widest text-sm shadow-xl shadow-cyan-500/20">
                    EXECUTE SWAP
                </button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/60 backdrop-blur-2xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-bold">HOME</span>
        </a>
        <a href="swap.html" class="flex flex-col items-center text-cyan-400 transition-all">
            <svg class="w-6 h-6 mb-1 scale-110" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="text-[9px] font-bold">SWAP</span>
        </a>
        <a href="forge.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            <span class="text-[9px] font-bold">FORGE</span>
        </a>
        <a href="assets.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[9px] font-bold">DATA</span>
        </a>
        <a href="/admin" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-bold">OPERATOR</span>
        </a>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        function handleSwap() {
            const amount = document.getElementById('swapInput').value;
            if(!amount || amount <= 0) {
                alert("Please enter amount");
                return;
            }
            alert(`Initializing swap for ${amount} TON. Please confirm in your wallet.`);
        }

        // Particle background logic
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { 
                canvas.width = window.innerWidth; 
                canvas.height = window.innerHeight; 
            }
            window.addEventListener('resize', resize);
            resize();
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.speed = Math.random() * 0.4 + 0.1;
                    this.opacity = Math.random() * 0.2;
                }
                update() { 
                    this.y -= this.speed; 
                    if (this.y < 0) this.y = canvas.height; 
                }
                draw() { 
                    ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`; 
                    ctx.fillRect(this.x, this.y, 1, 1); 
                }
            }
            for(let i=0; i<70; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
