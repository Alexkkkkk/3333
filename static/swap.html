<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | ULTRA SWAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #7000ff;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: #050b10; 
            overflow-x: hidden; 
            color: #94a3b8; 
        }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.4), rgba(2, 6, 23, 0.6));
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        
        .terminal-scroll::-webkit-scrollbar { width: 2px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.2); }

        .chart-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 10s linear infinite; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="antialiased">
    <canvas id="bg-canvas"></canvas>

    <header class="p-6 flex justify-between items-center relative z-50 max-w-4xl mx-auto">
        <a href="index.html" class="flex items-center gap-2 group">
            <div class="relative">
                <div class="absolute inset-0 bg-cyan-500 blur-lg opacity-20 group-hover:opacity-40 transition-opacity"></div>
                <img src="/images/logo.png" alt="Logo" class="w-10 h-10 relative z-10" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7038/7038131.png'">
            </div>
            <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">QUAN<span class="text-cyan-400">CORE</span></h1>
        </a>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-32 relative z-10">
        <div class="glass-card rounded-3xl p-4 mb-4 overflow-hidden relative border border-white/5">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-[9px] font-black uppercase text-slate-500 tracking-[0.2em]">Quantum Oracle V4</span>
                <span id="priceStatus" class="text-[10px] font-bold text-green-400 mono">Stable +0.00%</span>
            </div>
            <svg viewBox="0 0 400 60" class="w-full h-12">
                <path id="chartPath" d="M0 30 Q 50 10, 100 40 T 200 30 T 300 50 T 400 20" fill="none" stroke="url(#lineGrad)" stroke-width="2" class="chart-line"/>
                <defs>
                    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:var(--neon-cyan)" />
                        <stop offset="100%" style="stop-color:var(--neon-purple)" />
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <div class="glass-card p-6 rounded-[32px] shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black italic text-white uppercase tracking-wider text-lg">SWAP TERMINAL</h2>
                <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-xl border border-white/5">
                    <span class="text-[8px] font-bold text-slate-500 uppercase">Slippage</span>
                    <select id="slipSelect" class="bg-transparent text-[10px] font-bold text-cyan-400 outline-none cursor-pointer">
                        <option value="0.1">0.1%</option>
                        <option value="0.5" selected>0.5%</option>
                        <option value="1.0">1.0%</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2 relative">
                <div class="bg-black/40 p-5 rounded-3xl border border-white/5 focus-within:border-cyan-500/40 transition-all">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Pay</span>
                        <button onclick="setMax()" class="text-[10px] text-cyan-500 font-black hover:text-cyan-300 transition-colors">MAX: <span id="balDisplay" class="mono">0.00</span></button>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="number" id="amtIn" placeholder="0.0" class="bg-transparent text-3xl font-black outline-none w-full text-white placeholder:text-white/5">
                        <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-xl border border-white/5 min-w-[90px] justify-center">
                            <span id="tIn" class="text-sm text-white font-black italic">TON</span>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center -my-4 relative z-20">
                    <button onclick="switchTokens()" class="bg-cyan-500 p-3 rounded-2xl shadow-lg shadow-cyan-500/20 hover:scale-110 active:scale-90 transition-all border-4 border-[#050b10] group">
                        <svg class="w-5 h-5 text-black group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                            <path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                        </svg>
                    </button>
                </div>

                <div class="bg-black/40 p-5 rounded-3xl border border-white/5">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Receive</span>
                        <span id="impact" class="text-[9px] text-green-500 font-bold mono">IMPACT < 0.01%</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="number" id="amtOut" readonly placeholder="0.0" class="bg-transparent text-3xl font-black outline-none w-full text-cyan-400 placeholder:text-cyan-400/10">
                        <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-xl border border-white/5 min-w-[90px] justify-center">
                            <span id="tOut" class="text-sm text-white font-black italic">QC</span>
                        </div>
                    </div>
                </div>

                <div class="px-2 pt-4 flex justify-between items-center border-t border-white/5 mt-4">
                    <div class="flex flex-col">
                        <span class="text-[8px] text-slate-500 uppercase font-black">Exchange Rate</span>
                        <span id="rateLabel" class="text-[10px] text-white font-bold mono">1 TON ≈ 450.00 QC</span>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[8px] text-slate-500 uppercase font-black">Network Fee</span>
                        <span id="gasLabel" class="text-[10px] text-cyan-500 font-bold mono">~0.012 TON</span>
                    </div>
                </div>

                <button id="actionBtn" onclick="handleSwap()" class="w-full mt-4 bg-cyan-500 hover:bg-cyan-400 disabled:opacity-30 disabled:grayscale text-black font-black py-5 rounded-2xl transition-all active:scale-[0.98] uppercase tracking-[0.2em] text-xs shadow-xl shadow-cyan-500/10">
                    Connect Wallet
                </button>
            </div>
        </div>

        <div class="mt-4 glass-card rounded-2xl p-4 border border-white/5">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-black text-white uppercase tracking-tighter">Node Console</span>
            </div>
            <div id="terminal" class="terminal-scroll h-24 overflow-y-auto font-mono text-[9px] space-y-1 opacity-60">
                <p class="text-cyan-500">> System Ready</p>
                <p class="text-slate-500">> Link established with DeDust pools...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-2xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-5 h-5 mb-1 group-hover:scale-110" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[8px] font-bold">HOME</span>
        </a>
        <a href="swap.html" class="flex flex-col items-center text-cyan-400 transition-all">
            <svg class="w-5 h-5 mb-1 scale-110" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="text-[8px] font-bold">SWAP</span>
        </a>
        <a href="forge.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-5 h-5 mb-1 group-hover:scale-110" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            <span class="text-[8px] font-bold">FORGE</span>
        </a>
        <a href="assets.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-5 h-5 mb-1 group-hover:scale-110" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[8px] font-bold">DATA</span>
        </a>
        <a href="operator.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-5 h-5 mb-1 group-hover:scale-110" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[8px] font-bold">OPERATOR</span>
        </a>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        const state = {
            isTontoQC: true,
            rate: 450.00,
            balance: 0.00,
            wallet: null,
            fee: 0.012
        };

        const ui = {
            in: document.getElementById('amtIn'),
            out: document.getElementById('amtOut'),
            btn: document.getElementById('actionBtn'),
            bal: document.getElementById('balDisplay'),
            rate: document.getElementById('rateLabel'),
            terminal: document.getElementById('terminal'),
            impact: document.getElementById('impact'),
            gas: document.getElementById('gasLabel'),
            priceStatus: document.getElementById('priceStatus')
        };

        function log(msg, color = 'slate-500') {
            const p = document.createElement('p');
            p.className = `text-${color}`;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            p.innerText = `[${time}] > ${msg}`;
            ui.terminal.appendChild(p);
            ui.terminal.scrollTop = ui.terminal.scrollHeight;
            if (ui.terminal.childElementCount > 15) ui.terminal.removeChild(ui.terminal.firstChild);
        }

        async function syncWithCore() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                const drift = (Math.random() * 0.4 - 0.2); 
                state.rate = 450.00 + (data.roi * 1.5) + drift;
                ui.priceStatus.innerText = `ROI ${data.roi}% ${data.roi >= 0 ? '▲' : '▼'}`;
                ui.priceStatus.className = `text-[10px] font-bold mono ${data.roi >= 0 ? 'text-green-400' : 'text-red-400'}`;
                calculate();
            } catch (e) {
                // Если API недоступно, создаем симуляцию для фронтенда
                const drift = (Math.random() * 0.1 - 0.05);
                state.rate += drift;
                calculate();
            }
        }
        setInterval(syncWithCore, 5000);

        function calculate() {
            const val = parseFloat(ui.in.value) || 0;
            const res = state.isTontoQC ? val * state.rate : val / state.rate;
            ui.out.value = val > 0 ? res.toFixed(state.isTontoQC ? 2 : 5) : "";
            
            ui.rate.innerText = `1 ${state.isTontoQC ? 'TON' : 'QC'} ≈ ${state.isTontoQC ? state.rate.toFixed(2) : (1/state.rate).toFixed(6)} ${state.isTontoQC ? 'QC' : 'TON'}`;
            
            const imp = (val / (state.balance || 100)) * 1.8;
            ui.impact.innerText = val > 0 ? `IMPACT ${imp.toFixed(2)}%` : "IMPACT < 0.01%";
            ui.impact.className = `text-[9px] font-bold mono ${imp > 2 ? 'text-red-500' : 'text-green-500'}`;
            
            state.fee = 0.01 + (Math.random() * 0.005);
            ui.gas.innerText = `~${state.fee.toFixed(3)} TON`;
            checkBtn();
        }

        function checkBtn() {
            if(!state.wallet) {
                ui.btn.innerText = "Connect Wallet";
                ui.btn.disabled = false;
                return;
            }
            const val = parseFloat(ui.in.value) || 0;
            if(val <= 0) { ui.btn.innerText = "Enter Amount"; ui.btn.disabled = true; }
            else if(val > state.balance) { ui.btn.innerText = "Insufficient Balance"; ui.btn.disabled = true; }
            else { ui.btn.innerText = "Execute Swap"; ui.btn.disabled = false; }
        }

        ui.in.oninput = calculate;

        async function handleSwap() {
            if(!state.wallet) { await tonConnectUI.openModal(); return; }
            
            const amount = parseFloat(ui.in.value);
            const receive = parseFloat(ui.out.value);
            const addr = state.wallet.account.address;

            log(`Initiating broadcast to Nexus Node...`, 'cyan-500');
            ui.btn.disabled = true;
            ui.btn.innerText = "Broadcasting...";

            try {
                await new Promise(r => setTimeout(r, 2000));
                
                await fetch('/api/wallet/sync', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        address: addr,
                        balance: state.isTontoQC ? (state.balance - amount) : (state.balance + receive),
                        qc: state.isTontoQC ? receive : amount
                    })
                });

                log(`Nexus link established. Hash: ${Math.random().toString(16).slice(2,12)}`, 'green-400');
                
                state.balance -= amount;
                ui.bal.innerText = state.balance.toFixed(2);
                ui.in.value = "";
                calculate();
                alert("QUANCORE: Quantum Swap Executed");

            } catch (e) {
                log("Critical: Node Sync Failed", "red-500");
                checkBtn();
            }
        }

        function switchTokens() {
            state.isTontoQC = !state.isTontoQC;
            document.getElementById('tIn').innerText = state.isTontoQC ? 'TON' : 'QC';
            document.getElementById('tOut').innerText = state.isTontoQC ? 'QC' : 'TON';
            
            // Тестовый баланс для переключения
            state.balance = state.isTontoQC ? 15.45 : 4500.00;
            ui.bal.innerText = state.balance.toFixed(2);
            
            ui.in.value = "";
            log(`Route shifted to ${state.isTontoQC ? 'TON/QC' : 'QC/TON'}`, 'purple-400');
            calculate();
        }

        function setMax() {
            const safe = state.isTontoQC ? 0.05 : 0;
            ui.in.value = Math.max(0, state.balance - safe).toFixed(2);
            calculate();
        }

        tonConnectUI.onStatusChange(async (w) => {
            state.wallet = w;
            if(w) {
                log(`Handshake: Node ${w.account.address.slice(0,6)} initialized`, "green-400");
                try {
                    const res = await fetch('/api/stats');
                    const data = await res.json();
                    state.balance = data.balance || 15.45;
                } catch(e) {
                    state.balance = 15.45;
                }
                ui.bal.innerText = state.balance.toFixed(2);
            } else {
                log("Node Offline", "red-400");
                state.balance = 0;
                ui.bal.innerText = "0.00";
            }
            checkBtn();
        });

        // Background Particles
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        const init = () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array.from({length: 40}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                s: Math.random() * 2, v: Math.random() * 0.3 + 0.1
            }));
        };
        const draw = () => {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 242, 255, 0.05)";
            pts.forEach(p => {
                ctx.fillRect(p.x, p.y, p.s, p.s);
                p.y -= p.v; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(draw);
        };
        window.onresize = init; init(); draw();
    </script>
</body>
</html>
