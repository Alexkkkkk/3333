<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | FORGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { background-color: #050b10; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        #bg-canvas {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }

        .forge-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.25rem;
            border-radius: 1.25rem;
            color: white;
            font-weight: bold;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .forge-input:focus {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.05);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
        }

        .glass-card {
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="text-slate-300">
    <canvas id="bg-canvas"></canvas>
    
    <header class="p-6 flex justify-between items-center relative z-50">
        <a href="index.html" class="flex items-center gap-2 group">
            <img src="/images/logo.png" alt="Logo" class="w-10 h-10 transition-transform group-hover:rotate-12">
            <h1 class="text-xl font-black italic text-white uppercase">QUAN<span class="text-cyan-400">CORE</span></h1>
        </a>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-40 relative z-10">
        <div class="glass-card p-8 rounded-[2.5rem] border border-white/10 shadow-2xl overflow-hidden relative">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-500/10 blur-[80px] rounded-full"></div>
            
            <div class="flex justify-between items-center mb-8 relative z-10">
                <div>
                    <h2 class="font-black italic text-white uppercase text-2xl tracking-tighter">Mint Terminal</h2>
                    <p class="text-[9px] text-purple-400 font-bold uppercase tracking-[0.3em] mt-1">Jetton Creation Protocol</p>
                </div>
                <div class="w-12 h-12 bg-purple-500/10 rounded-2xl flex items-center justify-center border border-purple-500/20 shadow-inner">
                    <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>
                </div>
            </div>

            <div class="bg-red-500/5 border border-red-500/20 p-5 rounded-2xl mb-8 flex items-start gap-4 relative z-10">
                <div class="bg-red-500/20 p-2 rounded-lg">
                    <svg class="w-4 h-4 text-red-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/></svg>
                </div>
                <div>
                    <p class="text-[10px] text-red-400 font-black uppercase tracking-widest">Protocol Fee Required</p>
                    <p class="text-[11px] text-red-400/70 font-medium mt-1 uppercase leading-tight">0.25 TON for smart-contract deployment and metadata storage.</p>
                </div>
            </div>

            <div class="space-y-2 relative z-10">
                <input type="text" id="tokenName" placeholder="TOKEN NAME (e.g. Quantum)" class="forge-input placeholder:text-white/5">
                <input type="text" id="tokenSymbol" placeholder="SYMBOL (e.g. QC)" class="forge-input uppercase placeholder:text-white/5">
                <input type="number" id="tokenSupply" inputmode="numeric" placeholder="TOTAL SUPPLY" class="forge-input placeholder:text-white/5">
                
                <button id="mintButton" onclick="handleMint()" class="w-full mt-6 py-5 rounded-2xl font-black text-white uppercase tracking-[0.2em] text-xs transition-all active:scale-[0.98] shadow-2xl shadow-purple-500/20 hover:shadow-purple-500/40" 
                        style="background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);">
                    Initialize Mint
                </button>
            </div>
        </div>

        <div class="mt-8 px-6 flex justify-between items-center opacity-30 mono">
            <span class="text-[8px] font-bold uppercase tracking-[0.2em]">Standard: TEP-74</span>
            <div class="flex items-center gap-1">
                <div class="w-1 h-1 bg-purple-400 rounded-full animate-pulse"></div>
                <span class="text-[8px] font-bold uppercase tracking-[0.2em] text-purple-400">Core Verified</span>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-black/80 backdrop-blur-3xl border border-white/10 rounded-[2.5rem] p-2 flex justify-between items-center z-[100] shadow-2xl">
        <a href="index.html" class="flex-1 flex flex-col items-center py-3 text-slate-500 hover:text-white transition-all">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[8px] font-black uppercase">Home</span>
        </a>
        <a href="swap.html" class="flex-1 flex flex-col items-center py-3 text-slate-500 hover:text-white transition-all">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="text-[8px] font-black uppercase">Swap</span>
        </a>
        <div class="flex-1 flex flex-col items-center py-3 text-purple-400 relative">
            <div class="absolute inset-0 bg-purple-500/10 rounded-2xl blur-sm"></div>
            <svg class="w-6 h-6 mb-1 relative z-10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            <span class="text-[8px] font-black uppercase relative z-10">Forge</span>
        </div>
        <a href="assets.html" class="flex-1 flex flex-col items-center py-3 text-slate-500 hover:text-white transition-all">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[8px] font-black uppercase">Data</span>
        </a>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        // Логика минтинга
        async function handleMint() {
            const name = document.getElementById('tokenName').value;
            const symbol = document.getElementById('tokenSymbol').value;
            const supply = document.getElementById('tokenSupply').value;

            if (!tonConnectUI.connected) {
                alert("Please connect wallet via TON Connect");
                return;
            }

            if (!name || !symbol || !supply) {
                alert("Please fill all deployment parameters");
                return;
            }

            const btn = document.getElementById('mintButton');
            btn.innerText = "Processing Deployment...";
            btn.disabled = true;

            // Здесь будет вызов транзакции минтинга
            console.log("Minting initialized:", { name, symbol, supply });
        }

        // Particle background logic (Purple Edition)
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();
            
            class Particle {
                constructor() {
                    this.init();
                }
                init() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.speed = Math.random() * 0.3 + 0.1;
                    this.opacity = Math.random() * 0.3;
                    this.size = Math.random() * 1.5;
                }
                update() { 
                    this.y -= this.speed; 
                    if (this.y < 0) this.init(); 
                }
                draw() { 
                    ctx.fillStyle = `rgba(168, 85, 247, ${this.opacity})`; 
                    ctx.fillRect(this.x, this.y, this.size, this.size); 
                }
            }
            for(let i=0; i<60; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
