<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | FORGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --forge-accent: #a855f7;
            --forge-glow: rgba(168, 85, 247, 0.4);
        }

        body { 
            background-color: #050b10; 
            font-family: 'JetBrains Mono', monospace;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        #bg-canvas {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }

        .forge-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.25rem;
            border-radius: 1.25rem;
            color: white;
            font-weight: bold;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 0.75rem;
        }
        
        .forge-input:focus {
            border-color: var(--forge-accent);
            background: rgba(168, 85, 247, 0.05);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
        }

        .glass-card {
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(20px);
        }

        /* Styles for the new navigation */
        .fixed-bottom-nav {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.75rem;
            z-index: 200;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .nav-item a {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .nav-item span {
            font-size: 8px;
            font-weight: 900;
            margin-top: 4px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .nav-item.active a { 
            color: var(--forge-accent); 
            filter: drop-shadow(0 0 5px var(--forge-accent));
        }
        .nav-item:hover a { color: #f8fafc; }
        
        [class^="icon-"] {
            width: 20px;
            height: 20px;
            display: inline-block;
            background: currentColor;
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }
        .icon-home { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>'); }
        .icon-swap { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>'); }
        .icon-plus { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'); }
        .icon-chart { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/></svg>'); }
        .icon-user { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'); }
    </style>
</head>
<body class="text-slate-300">
    <canvas id="bg-canvas"></canvas>
    
    <header class="p-6 flex justify-between items-center relative z-50">
        <a href="index.html" class="flex items-center gap-2 group">
            <img src="/images/logo.png" alt="Logo" class="w-10 h-10 transition-transform group-hover:rotate-12" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7038/7038131.png'">
            <h1 class="text-xl font-black italic text-white uppercase">QUAN<span class="text-cyan-400">CORE</span></h1>
        </a>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-48 relative z-10">
        <div class="glass-card p-8 rounded-[2.5rem] border border-white/10 shadow-2xl overflow-hidden relative">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-500/10 blur-[80px] rounded-full"></div>
            
            <div class="flex justify-between items-center mb-8 relative z-10">
                <div>
                    <h2 class="font-black italic text-white uppercase text-2xl tracking-tighter">Mint Terminal</h2>
                    <p class="text-[9px] text-purple-400 font-bold uppercase tracking-[0.3em] mt-1">Jetton Creation Protocol</p>
                </div>
                <div class="w-12 h-12 bg-purple-500/10 rounded-2xl flex items-center justify-center border border-purple-500/20 shadow-inner">
                    <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>
                </div>
            </div>

            <div class="bg-red-500/5 border border-red-500/20 p-5 rounded-2xl mb-8 flex items-start gap-4 relative z-10">
                <div class="bg-red-500/20 p-2 rounded-lg">
                    <svg class="w-4 h-4 text-red-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/></svg>
                </div>
                <div>
                    <p class="text-[10px] text-red-400 font-black uppercase tracking-widest">Protocol Fee Required</p>
                    <p class="text-[11px] text-red-400/70 font-medium mt-1 uppercase leading-tight">0.25 TON for smart-contract deployment and metadata storage.</p>
                </div>
            </div>

            <div class="space-y-2 relative z-10">
                <input type="text" id="tokenName" placeholder="TOKEN NAME (e.g. Quantum)" class="forge-input placeholder:text-white/5">
                <input type="text" id="tokenSymbol" placeholder="SYMBOL (e.g. QC)" class="forge-input uppercase placeholder:text-white/5">
                <input type="number" id="tokenSupply" inputmode="numeric" placeholder="TOTAL SUPPLY" class="forge-input placeholder:text-white/5">
                
                <button id="mintButton" onclick="handleMint()" class="w-full mt-6 py-5 rounded-2xl font-black text-white uppercase tracking-[0.2em] text-xs transition-all active:scale-[0.98] shadow-2xl shadow-purple-500/20 hover:shadow-purple-500/40" 
                        style="background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);">
                    Initialize Mint
                </button>
            </div>
        </div>

        <div class="mt-8 px-6 flex justify-between items-center opacity-30 mono">
            <span class="text-[8px] font-bold uppercase tracking-[0.2em]">Standard: TEP-74</span>
            <div class="flex items-center gap-1">
                <div class="w-1 h-1 bg-purple-400 rounded-full animate-pulse"></div>
                <span class="text-[8px] font-bold uppercase tracking-[0.2em] text-purple-400">Core Verified</span>
            </div>
        </div>
    </main>

    <nav class="fixed-bottom-nav">
        <div class="nav-item">
            <a href="/index.html">
                <i class="icon-home"></i>
                <span>HOME</span>
            </a>
        </div>
        <div class="nav-item">
            <a href="/swap.html">
                <i class="icon-swap"></i>
                <span>SWAP</span>
            </a>
        </div>
        <div class="nav-item active">
            <a href="/forge.html">
                <i class="icon-plus"></i>
                <span>FORGE</span>
            </a>
        </div>
        <div class="nav-item">
            <a href="/assets.html"> 
                <i class="icon-chart"></i>
                <span>DATA</span>
            </a>
        </div>
        <div class="nav-item">
            <a href="/admin"> 
                <i class="icon-user"></i>
                <span>OPERATOR</span>
            </a>
        </div>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        async function handleMint() {
            const name = document.getElementById('tokenName').value;
            const symbol = document.getElementById('tokenSymbol').value;
            const supply = document.getElementById('tokenSupply').value;

            if (!tonConnectUI.connected) {
                alert("Please connect wallet via TON Connect");
                return;
            }

            if (!name || !symbol || !supply) {
                alert("Please fill all deployment parameters");
                return;
            }

            const btn = document.getElementById('mintButton');
            btn.innerText = "Processing Deployment...";
            btn.disabled = true;

            console.log("Minting initialized:", { name, symbol, supply });
        }

        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();
            
            class Particle {
                constructor() {
                    this.init();
                }
                init() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.speed = Math.random() * 0.3 + 0.1;
                    this.opacity = Math.random() * 0.3;
                    this.size = Math.random() * 1.5;
                }
                update() { 
                    this.y -= this.speed; 
                    if (this.y < 0) this.init(); 
                }
                draw() { 
                    ctx.fillStyle = `rgba(168, 85, 247, ${this.opacity})`; 
                    ctx.fillRect(this.x, this.y, this.size, this.size); 
                }
            }
            for(let i=0; i<60; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
