<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | NEURAL STAKING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-cyan: #06b6d4;
            --neon-green: #10b981;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #020617;
            color: #f8fafc;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        .premium-glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Контейнер для графика котировок */
        .chart-visual {
            width: 100%;
            height: 140px;
            background: rgba(6, 182, 212, 0.03);
            border-radius: 2rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(6, 182, 212, 0.1);
        }

        #price-chart { width: 100%; height: 100%; }

        .btn-neural {
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .btn-neural::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }
        .btn-neural:hover::after { transform: translateX(100%); }

        #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        
        .scanline {
            width: 100%; height: 2px;
            background: rgba(6, 182, 212, 0.1);
            position: absolute; top: 0;
            animation: scan 4s linear infinite;
            z-index: 1; pointer-events: none;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="antialiased">
    <canvas id="bg-canvas"></canvas>
    <div class="scanline"></div>

    <header class="p-6 flex justify-between items-center relative z-50">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 relative flex items-center justify-center">
                <div class="absolute inset-0 bg-cyan-500 rounded-full blur-xl opacity-20 animate-pulse"></div>
                <img src="/images/logo.png" alt="Logo" class="w-10 h-10 relative z-10">
            </div>
            <div>
                <h1 class="text-xl font-black italic text-white uppercase tracking-tighter leading-none">QUAN<span class="text-cyan-400">CORE</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-[8px] font-bold text-cyan-500/60 uppercase tracking-[0.3em]">QC/TON:</span>
                    <span class="text-[10px] font-mono text-green-400 font-bold" id="live-price">$2.4512</span>
                </div>
            </div>
        </div>
        <div id="connectBtn" class="scale-90 shadow-2xl shadow-cyan-500/10"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-32 relative z-10">
        
        <div class="chart-visual premium-glass">
            <div class="absolute top-4 left-6 flex items-center gap-3">
                <div class="w-2 h-2 bg-cyan-500 rounded-full animate-ping"></div>
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-cyan-400/80">Neural Growth Index</span>
            </div>
            <div class="absolute top-4 right-6 text-right">
                <span class="text-[10px] font-mono text-green-400 font-bold">+12.4%</span>
            </div>
            <canvas id="price-chart"></canvas>
        </div>

        <div class="premium-glass rounded-[2.5rem] p-8 mb-6 relative overflow-hidden group">
            <div class="absolute -top-24 -left-24 w-64 h-64 bg-cyan-500/5 blur-[100px] group-hover:bg-cyan-500/10 transition-all"></div>

            <div class="relative z-10">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black italic text-white uppercase tracking-tighter">Staking <span class="text-cyan-400">Hub</span></h2>
                    <div class="text-right">
                        <p class="text-[10px] text-cyan-400 font-black tracking-widest uppercase mb-1">Yield Cap</p>
                        <div class="h-1.5 w-24 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-cyan-500 w-[72%] shadow-[0_0_10px_#06b6d4]"></div>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="bg-black/40 rounded-3xl p-6 border border-white/5 group-focus-within:border-cyan-500/50 transition-all">
                        <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-4 block">Deployment Amount</label>
                        <div class="flex items-center gap-4">
                            <input type="number" id="stake-input" placeholder="0.00" 
                                   class="bg-transparent w-full text-4xl font-black text-white focus:outline-none placeholder:text-slate-800">
                            <div class="flex flex-col items-end">
                                <span class="text-cyan-400 font-black text-sm italic">QC</span>
                                <button onclick="setMax()" class="text-[9px] mt-2 font-bold text-slate-400 hover:text-white transition-colors bg-white/5 px-3 py-1 rounded-full border border-white/10 uppercase">Max</button>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Monthly Yield</p>
                            <p class="text-lg font-black text-white italic" id="calc-monthly">0.00</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Total Rewards</p>
                            <p class="text-lg font-black text-green-400 italic" id="calc-yearly">0.00</p>
                        </div>
                    </div>

                    <button class="btn-neural w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-6 rounded-2xl transition-all active:scale-95 uppercase tracking-[0.3em] text-xs shadow-2xl shadow-cyan-500/30">
                        Authorize Deployment
                    </button>
                </div>
            </div>
        </div>

        <div class="premium-glass rounded-3xl p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-ping"></div>
                    <h3 class="text-[10px] font-black text-white uppercase tracking-widest">Protocol Monitor</h3>
                </div>
                <span class="text-[8px] font-mono text-slate-600">ID: QC-NODE-01</span>
            </div>
            <div class="font-mono text-[9px] space-y-1.5 h-20 overflow-hidden text-cyan-400/40" id="node-logs">
                <p>> Initializing Quancore Neural Engine...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="premium-glass rounded-3xl p-5 relative group overflow-hidden">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-1">Locked Value</p>
                <p class="text-2xl font-black text-white italic" id="staked-val">2,450.00</p>
            </div>
            <div class="premium-glass rounded-3xl p-5 relative overflow-hidden">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-1">Mining Rewards</p>
                <p class="text-2xl font-black text-green-400 italic" id="reward-val">42.1855</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/40 backdrop-blur-2xl border-t border-white/5 p-5 flex justify-around items-center z-50">
        <a href="index.html" class="text-slate-500 hover:text-white transition-all transform hover:-translate-y-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        </a>
        <a href="operator.html" class="text-cyan-400 relative">
            <div class="absolute -inset-2 bg-cyan-500/20 blur-lg rounded-full animate-pulse"></div>
            <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </a>
        <a href="assets.html" class="text-slate-500 hover:text-white transition-all transform hover:-translate-y-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        </a>
    </nav>

    <script>
        // --- LIVE PRICE CHART (ВЕРХНЯЯ ВИЗУАЛИЗАЦИЯ) ---
        const priceCanvas = document.getElementById('price-chart');
        const pCtx = priceCanvas.getContext('2d');
        let pricePoints = Array.from({length: 30}, (_, i) => 50 + Math.random() * 30);

        function drawPriceChart() {
            priceCanvas.width = priceCanvas.offsetWidth;
            priceCanvas.height = priceCanvas.offsetHeight;
            
            pCtx.clearRect(0, 0, priceCanvas.width, priceCanvas.height);
            
            // Сдвигаем данные
            pricePoints.shift();
            const lastVal = pricePoints[pricePoints.length - 1];
            pricePoints.push(Math.max(20, Math.min(100, lastVal + (Math.random() - 0.48) * 10)));

            // Рисуем градиентную область
            pCtx.beginPath();
            pCtx.moveTo(0, priceCanvas.height);
            pricePoints.forEach((p, i) => {
                const x = (i / (pricePoints.length - 1)) * priceCanvas.width;
                const y = priceCanvas.height - (p / 120) * priceCanvas.height;
                pCtx.lineTo(x, y);
            });
            pCtx.lineTo(priceCanvas.width, priceCanvas.height);
            
            const grad = pCtx.createLinearGradient(0, 0, 0, priceCanvas.height);
            grad.addColorStop(0, 'rgba(6, 182, 212, 0.2)');
            grad.addColorStop(1, 'rgba(6, 182, 212, 0)');
            pCtx.fillStyle = grad;
            pCtx.fill();

            // Рисуем линию
            pCtx.beginPath();
            pCtx.strokeStyle = '#06b6d4';
            pCtx.lineWidth = 3;
            pCtx.lineJoin = 'round';
            pCtx.shadowBlur = 15;
            pCtx.shadowColor = 'rgba(6, 182, 212, 0.5)';
            
            pricePoints.forEach((p, i) => {
                const x = (i / (pricePoints.length - 1)) * priceCanvas.width;
                const y = priceCanvas.height - (p / 120) * priceCanvas.height;
                if (i === 0) pCtx.moveTo(x, y);
                else pCtx.lineTo(x, y);
            });
            pCtx.stroke();
        }
        setInterval(drawPriceChart, 150);

        // --- ЦЕНА В ХЕДЕРЕ ---
        let currentPrice = 2.4512;
        setInterval(() => {
            currentPrice += (Math.random() - 0.49) * 0.002;
            document.getElementById('live-price').innerText = `$${currentPrice.toFixed(4)}`;
        }, 1000);

        // --- CALCULATION LOGIC ---
        const input = document.getElementById('stake-input');
        const APR = 0.245;
        input.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value) || 0;
            document.getElementById('calc-monthly').innerText = (val * APR / 12).toFixed(2);
            document.getElementById('calc-yearly').innerText = (val * APR).toFixed(2);
        });
        function setMax() { input.value = 5000; input.dispatchEvent(new Event('input')); }

        // --- REWARD TICKER ---
        let currentReward = 42.1855;
        setInterval(() => {
            currentReward += 0.0001;
            document.getElementById('reward-val').innerText = currentReward.toFixed(4);
        }, 1000);

        // --- NEURAL NETWORK BACKGROUND ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = Array.from({length: 50}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4
            }));
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(6, 182, 212, 0.05)';
            ctx.fillStyle = 'rgba(6, 182, 212, 0.3)';
            dots.forEach((d, i) => {
                d.x += d.vx; d.y += d.vy;
                if (d.x < 0 || d.x > canvas.width) d.vx *= -1;
                if (d.y < 0 || d.y > canvas.height) d.vy *= -1;
                ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI * 2); ctx.fill();
                for (let j = i + 1; j < dots.length; j++) {
                    const d2 = dots[j];
                    const dist = Math.hypot(d.x - d2.x, d.y - d2.y);
                    if (dist < 120) {
                        ctx.lineWidth = 1 - dist/120;
                        ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d2.x, d2.y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();

        // --- LOGS ---
        const logs = document.getElementById('node-logs');
        const msgs = ["Block confirmed", "Neural re-balancing...", "Pool liquidity sync", "Connection: STABLE", "DeDust shard update"];
        setInterval(() => {
            const p = document.createElement('p');
            p.innerText = `> [${new Date().toLocaleTimeString()}]: ${msgs[Math.floor(Math.random()*msgs.length)]}`;
            logs.prepend(p);
            if(logs.children.length > 5) logs.lastChild.remove();
        }, 4000);

        // --- TON CONNECT ---
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });
    </script>
</body>
</html>
