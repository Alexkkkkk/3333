<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | NEURAL STAKING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-cyan: #06b6d4;
            --neon-green: #10b981;
            --glass: rgba(15, 23, 42, 0.4);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #020617;
            color: #f8fafc;
            overflow-x: hidden;
            letter-spacing: -0.01em;
            -webkit-tap-highlight-color: transparent;
        }

        .premium-glass {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #canvas-3d-container {
            width: 100%;
            height: 220px;
            position: relative;
            margin-bottom: 1.5rem;
            border-radius: 2.5rem;
            overflow: hidden;
            background: radial-gradient(circle at center, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
        }

        .btn-neural {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, #06b6d4, #0891b2);
        }
        
        .btn-neural::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }
        .btn-neural:hover::after { transform: translateX(100%); }
        .btn-neural:active { transform: scale(0.97); }

        #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        
        .fixed-bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 2rem;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .nav-item a {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-item span {
            font-size: 8px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .nav-item.active a {
            color: var(--neon-cyan);
            filter: drop-shadow(0 0 8px var(--neon-cyan));
        }

        .nav-icon { width: 22px; height: 22px; }

        .pool-progress {
            transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px var(--neon-cyan);
        }
    </style>
</head>
<body class="antialiased">
    <canvas id="bg-canvas"></canvas>

    <header class="p-6 flex justify-between items-center relative z-50">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 relative flex items-center justify-center">
                <div class="absolute inset-0 bg-cyan-500 rounded-full blur-xl opacity-20 animate-pulse"></div>
                <img src="images/logo.png" alt="Logo" class="w-10 h-10 relative z-10">
            </div>
            <div>
                <h1 class="text-xl font-black italic text-white uppercase tracking-tighter leading-none">QUAN<span class="text-cyan-400">CORE</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-[8px] font-bold text-cyan-500/60 uppercase tracking-[0.3em]">Live Node:</span>
                    <span class="text-[10px] font-mono text-green-400 font-bold" id="live-price">---</span>
                </div>
            </div>
        </div>
        <div id="connectBtn" class="scale-90"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-32 relative z-10">
        
        <div id="canvas-3d-container" class="premium-glass">
            <div class="absolute top-4 left-6 z-20">
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-400">Neural Core Alpha</span>
            </div>
            <div id="three-js-canvas"></div>
        </div>

        <div class="premium-glass rounded-[2.5rem] p-6 mb-6 border-t border-cyan-500/30">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-black uppercase tracking-[0.2em] text-cyan-400">Neural Executor v2.1</h3>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-2 w-2" id="ai-status-pulse">
                        <span class="absolute inline-flex h-full w-full rounded-full bg-slate-500 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-slate-600"></span>
                    </span>
                    <span class="text-[9px] font-bold text-slate-400 uppercase" id="ai-status-text">AI Standby</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="toggleAI(this)" id="ai-toggle-btn" class="bg-cyan-500/10 border border-cyan-500/20 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-cyan-500/20 transition-all tracking-widest text-cyan-400">
                    Start AI Arbitrage
                </button>
                <button class="bg-white/5 border border-white/10 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-white/10 transition-all tracking-widest text-slate-400">
                    Strategy: Aggressive
                </button>
            </div>

            <div class="h-10 flex items-end gap-1 px-2 mb-2" id="ai-wave-container">
                </div>
        </div>

        <div class="premium-glass rounded-[2.5rem] p-8 mb-6 relative overflow-hidden group">
            <div class="relative z-10">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h2 class="text-2xl font-black italic text-white uppercase tracking-tighter">Pool <span class="text-cyan-400">Growth</span></h2>
                        <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">Global TVL: <span id="global-tvl">1.2M</span> QC</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-cyan-400 font-black tracking-widest uppercase mb-1">Yield Efficiency</p>
                        <div class="h-1.5 w-24 bg-white/5 rounded-full overflow-hidden">
                            <div id="pool-bar" class="h-full bg-cyan-500 pool-progress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="bg-black/40 rounded-3xl p-6 border border-white/5">
                        <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-4 block">Stake Amount</label>
                        <div class="flex items-center gap-4">
                            <input type="number" id="stake-input" placeholder="0.00" inputmode="decimal" 
                                   class="bg-transparent w-full text-4xl font-black text-white focus:outline-none placeholder:text-slate-800">
                            <button onclick="setMax()" class="text-[9px] font-bold text-slate-400 hover:text-white transition-colors bg-white/5 px-3 py-1 rounded-full border border-white/10 uppercase">Max</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Est. Monthly</p>
                            <p class="text-lg font-black text-white italic" id="calc-monthly">0.00</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Est. Yearly (24.5%)</p>
                            <p class="text-lg font-black text-green-400 italic" id="calc-yearly">0.00</p>
                        </div>
                    </div>

                    <button class="btn-neural w-full text-black font-black py-6 rounded-2xl uppercase tracking-[0.3em] text-xs shadow-2xl shadow-cyan-500/30">
                        Authorize Deployment
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="premium-glass rounded-3xl p-5 border-l-2 border-cyan-500">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-1">Active Stakes</p>
                <p class="text-2xl font-black text-white italic" id="staked-val">2,450.00</p>
            </div>
            <div class="premium-glass rounded-3xl p-5 border-l-2 border-green-500">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-1">Neural Rewards</p>
                <p class="text-2xl font-black text-green-400 italic" id="reward-val">42.1855</p>
            </div>
        </div>

        <div class="premium-glass rounded-3xl p-6">
            <div class="font-mono text-[9px] space-y-1.5 h-16 overflow-hidden text-cyan-400/40" id="node-logs">
                <p>> Initializing API Protocol...</p>
            </div>
        </div>
    </main>

    <nav class="fixed-bottom-nav">
        <div class="nav-item"><a href="index.html"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>HOME</span></a></div>
        <div class="nav-item"><a href="swap.html"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg><span>SWAP</span></a></div>
        <div class="nav-item active"><a href="forge.html"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg><span>FORGE</span></a></div>
        <div class="nav-item"><a href="assets.html"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg><span>DATA</span></a></div>
        <div class="nav-item"><a href="operator.html"><svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span>OPERATOR</span></a></div>
    </nav>

    <script>
        // --- API & DATA SYNC ---
        const PROTOCOL_API = {
            async fetchStats() {
                try {
                    const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=toncoin&vs_currencies=usd');
                    const data = await response.json();
                    return { price: data.toncoin.usd, tvl: "1.248.500", efficiency: 82 };
                } catch (e) { return { price: 2.4512, tvl: "1.200.000", efficiency: 78 }; }
            }
        };

        async function updateProtocolData() {
            const stats = await PROTOCOL_API.fetchStats();
            document.getElementById('live-price').innerText = `$${stats.price.toFixed(4)}`;
            document.getElementById('global-tvl').innerText = stats.tvl;
            document.getElementById('pool-bar').style.width = `${stats.efficiency}%`;
            addLog("Syncing with Global Protocol...");
        }

        // --- THREE.JS ENGINE ---
        const container = document.getElementById('canvas-3d-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.offsetWidth / 220, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.offsetWidth, 220);
        document.getElementById('three-js-canvas').appendChild(renderer.domElement);

        const geometry = new THREE.IcosahedronGeometry(2, 0);
        const material = new THREE.MeshPhongMaterial({ color: 0x06b6d4, wireframe: true, emissive: 0x06b6d4, emissiveIntensity: 0.5 });
        const core = new THREE.Mesh(geometry, material);
        scene.add(core);

        const light = new THREE.PointLight(0xffffff, 1, 100); light.position.set(5, 5, 5); scene.add(light);
        camera.position.z = 5;

        function animate3D() {
            requestAnimationFrame(animate3D);
            core.rotation.x += 0.005; core.rotation.y += 0.01;
            const pulse = 1 + Math.sin(Date.now() * 0.002) * 0.1;
            core.scale.set(pulse, pulse, pulse);
            renderer.render(scene, camera);
        }
        animate3D();

        // --- AI TRADING & VISUALIZATION ENGINE ---
        let aiActive = false;
        const waveContainer = document.getElementById('ai-wave-container');
        const bars = [];

        for(let i=0; i<30; i++) {
            const bar = document.createElement('div');
            bar.className = 'flex-1 bg-slate-800 rounded-t-sm transition-all duration-300';
            bar.style.height = '15%';
            waveContainer.appendChild(bar);
            bars.push(bar);
        }

        function toggleAI(btn) {
            aiActive = !aiActive;
            const statusPulse = document.getElementById('ai-status-pulse').children;
            const statusText = document.getElementById('ai-status-text');

            if(aiActive) {
                btn.innerText = "Stop Execution";
                btn.classList.replace('text-cyan-400', 'text-green-400');
                btn.classList.add('border-green-500/40');
                statusPulse[0].className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75';
                statusPulse[1].className = 'relative inline-flex rounded-full h-2 w-2 bg-green-500';
                statusText.innerText = "AI Online";
                addLog("Neural: Synchronizing with DEX liquidity...");
                runAIStep();
            } else {
                btn.innerText = "Start AI Arbitrage";
                btn.classList.replace('text-green-400', 'text-cyan-400');
                btn.classList.remove('border-green-500/40');
                statusPulse[0].className = 'absolute inline-flex h-full w-full rounded-full bg-slate-500';
                statusPulse[1].className = 'relative inline-flex rounded-full h-2 w-2 bg-slate-600';
                statusText.innerText = "AI Standby";
                bars.forEach(b => b.style.height = '15%');
            }
        }

        function runAIStep() {
            if(!aiActive) return;
            const pairs = ["TON/QC", "TON/USDT", "QC/GRAM"];
            const actions = ["Analyzing", "Buying Dip", "Arbitrage Gap", "Providing Liq"];
            const pair = pairs[Math.floor(Math.random()*pairs.length)];
            const action = actions[Math.floor(Math.random()*actions.length)];
            const profit = (Math.random() * 0.1).toFixed(4);

            if(Math.random() > 0.6) {
                addLog(`AI: ${action} ${pair} (+${profit} TON)`);
                core.material.emissive.setHex(0x10b981);
                setTimeout(() => core.material.emissive.setHex(0x06b6d4), 1000);
            }

            bars.forEach(bar => {
                const h = Math.random() * 100;
                bar.style.height = `${h}%`;
                bar.style.backgroundColor = h > 70 ? '#10b981' : '#06b6d4';
            });
            setTimeout(runAIStep, 2500 + Math.random() * 3000);
        }

        // --- UTILS ---
        function addLog(msg) {
            const logs = document.getElementById('node-logs');
            const p = document.createElement('p');
            p.innerText = `> ${msg}`;
            logs.prepend(p);
            if(logs.children.length > 5) logs.lastChild.remove();
        }

        document.getElementById('stake-input').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value) || 0;
            document.getElementById('calc-monthly').innerText = (val * 0.245 / 12).toFixed(2);
            document.getElementById('calc-yearly').innerText = (val * 0.245).toFixed(2);
        });

        function setMax() { 
            const input = document.getElementById('stake-input');
            input.value = 5000; 
            input.dispatchEvent(new Event('input')); 
        }

        // --- BG NETWORK ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function initBG() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            dots = Array.from({length: 40}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3
            }));
        }
        function drawBG() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(6, 182, 212, 0.15)';
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                if (d.x < 0 || d.x > canvas.width) d.vx *= -1;
                if (d.y < 0 || d.y > canvas.height) d.vy *= -1;
                ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawBG);
        }
        initBG(); drawBG();

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        updateProtocolData();
        setInterval(updateProtocolData, 15000);
    </script>
</body>
</html>
