<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | OPERATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050b10] text-slate-300">
    <canvas id="bg-canvas"></canvas>
    
    <header class="p-6 flex justify-between items-center relative z-50">
        <a href="index.html" class="flex items-center gap-2">
            <img src="/images/logo.png" alt="Logo" class="w-10 h-10">
            <h1 class="text-xl font-black italic text-white uppercase">QUAN<span class="text-cyan-400">CORE</span></h1>
        </a>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-lg mx-auto px-4 pb-32 relative z-10">
        <div class="glass-card mb-4 border-l-4 border-l-cyan-500 bg-white/5 p-5 rounded-r-3xl backdrop-blur-md">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-full flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </div>
                <div>
                    <h2 class="font-black italic text-white uppercase tracking-tight">Operator Profile</h2>
                    <p class="text-[10px] font-mono text-cyan-400/70 tracking-widest uppercase" id="wallet-address-display">Not Connected</p>
                </div>
            </div>
        </div>

        <div class="bg-black/40 border border-white/5 rounded-[2.5rem] p-8 mb-6 shadow-2xl relative overflow-hidden group">
            <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500/5 blur-3xl rounded-full"></div>
            
            <div class="flex justify-between items-start mb-8 relative z-10">
                <div>
                    <h3 class="text-2xl font-black text-white italic leading-none">STAKING POOL</h3>
                    <p class="text-[11px] text-cyan-400 font-bold mt-2 tracking-widest uppercase">Yield APR: 24.5%</p>
                </div>
                <div class="flex flex-col items-end">
                    <div class="bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 px-3 py-1 rounded-full text-[9px] font-black tracking-tighter animate-pulse">LIVE NODE</div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 gap-4 mb-8 relative z-10">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] text-slate-500 font-black uppercase mb-1">Staked Balance</p>
                    <p class="text-xl font-black text-white italic">0.00 <span class="text-cyan-400 text-sm">QC</span></p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] text-slate-500 font-black uppercase mb-1">Unclaimed Rewards</p>
                    <p class="text-xl font-black text-green-400 italic">+0.00 <span class="text-green-500/50 text-sm font-bold">QC</span></p>
                </div>
            </div>

            <div class="space-y-3 relative z-10">
                <button class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-5 rounded-2xl transition-all active:scale-95 uppercase tracking-widest text-xs shadow-xl shadow-cyan-500/20">
                    STAKE ASSETS
                </button>
                <button class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-black py-5 rounded-2xl transition-all uppercase tracking-widest text-xs">
                    CLAIM REWARDS
                </button>
            </div>
        </div>

        <div class="px-6 flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></div>
            <span class="text-[9px] font-bold text-slate-600 uppercase tracking-widest">Protocol Sync: 100%</span>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/60 backdrop-blur-2xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-bold uppercase">Home</span>
        </a>
        <a href="swap.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="text-[9px] font-bold uppercase">Swap</span>
        </a>
        <a href="forge.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            <span class="text-[9px] font-bold uppercase">Forge</span>
        </a>
        <a href="assets.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-all group">
            <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[9px] font-bold uppercase">Data</span>
        </a>
        <a href="operator.html" class="flex flex-col items-center text-cyan-400 transition-all">
            <svg class="w-6 h-6 mb-1 scale-110 shadow-cyan-500/50" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-bold uppercase">Operator</span>
        </a>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        // Отслеживание состояния кошелька
        tonConnectUI.onStatusChange(wallet => {
            const display = document.getElementById('wallet-address-display');
            if (wallet && display) {
                const addr = wallet.account.address;
                display.innerText = addr.slice(0, 8).toUpperCase() + '...' + addr.slice(-8).toUpperCase();
            } else {
                display.innerText = "NOT CONNECTED";
            }
        });

        // Анимация фона (частицы)
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { 
                canvas.width = window.innerWidth; 
                canvas.height = window.innerHeight; 
            }
            window.addEventListener('resize', resize);
            resize();
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.speed = Math.random() * 0.4 + 0.1;
                    this.opacity = Math.random() * 0.2;
                }
                update() { 
                    this.y -= this.speed; 
                    if (this.y < 0) this.y = canvas.height; 
                }
                draw() { 
                    ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`; 
                    ctx.fillRect(this.x, this.y, 1, 1); 
                }
            }
            for(let i=0; i<70; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
