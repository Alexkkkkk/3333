<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM | MONITORING</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #0088cc; 
            --bg: #0a0e12; 
            --panel: rgba(23, 28, 35, 0.7); 
            --border: rgba(255, 255, 255, 0.08); 
            --neon-blue: #00d2ff; 
        }
        body { 
            background: radial-gradient(circle at 50% 0%, #112233 0%, #0a0e12 100%); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        .quantum-card { 
            background: var(--panel); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 24px; 
            transition: 0.3s;
        }
        .nav-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); 
            padding: 10px 20px; 
            border-radius: 14px; 
            font-size: 11px; 
            font-family: 'Share Tech Mono', monospace;
            transition: 0.3s; 
            letter-spacing: 1px;
        }
        .nav-btn:hover { background: var(--accent); border-color: var(--neon-blue); }
        .nav-active { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(0, 136, 204, 0.1); }
        h1 { font-family: 'Share Tech Mono', monospace; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto p-6">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <h1 class="text-2xl">QuanCore <span class="text-blue-500 text-xs">v4.1 [MONITOR]</span></h1>
            <nav class="flex gap-4">
                <a href="admin.html" class="nav-btn nav-active">📊 MONITORING</a>
                <a href="wallets.html" class="nav-btn">💎 WALLETS</a>
                <a href="settings.html" class="nav-btn">⚙️ DISTRIBUTION</a>
            </nav>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="quantum-card">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Network Status</p>
                <div id="ai_status" class="text-xl font-mono text-green-400 mt-2 animate-pulse">ONLINE</div>
            </div>
            <div class="quantum-card">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Active Nodes</p>
                <div id="nodes_val" class="text-xl font-mono text-blue-400 mt-2">0</div>
            </div>
            <div class="quantum-card">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Total Traffic</p>
                <div id="traffic_val" class="text-xl font-mono text-white mt-2">0</div>
            </div>
            <div class="quantum-card">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Uptime</p>
                <div class="text-xl font-mono text-gray-400 mt-2">99.98%</div>
            </div>
        </div>

        <div class="quantum-card h-[450px]">
            <h2 class="text-xs font-mono text-gray-500 mb-6 uppercase">Real-time Data Stream</h2>
            <canvas id="monitorChart"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('monitorChart').getContext('2d');
        const blueGrad = ctx.createLinearGradient(0, 0, 0, 400);
        blueGrad.addColorStop(0, 'rgba(0, 210, 255, 0.2)');
        blueGrad.addColorStop(1, 'rgba(0, 210, 255, 0)');

        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [{
                    data: Array(30).fill(0).map(() => Math.floor(Math.random() * 40 + 10)),
                    borderColor: '#00d2ff',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: blueGrad,
                    pointRadius: 0
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#445566' } },
                    x: { display: false }
                }
            }
        });

        function updateLiveStats() {
            const traffic = Math.floor(Math.random() * 100 + 200);
            const nodes = Math.floor(Math.random() * 10 + 45);
            
            document.getElementById('traffic_val').innerText = traffic;
            document.getElementById('nodes_val').innerText = nodes;

            chart.data.datasets[0].data.shift();
            chart.data.datasets[0].data.push(traffic / 5);
            chart.update('none');
        }

        setInterval(updateLiveStats, 2500);
        updateLiveStats();
    </script>
</body>
</html>
