<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            background-color: #050b10; 
            font-family: 'JetBrains Mono', monospace; 
            overflow-x: hidden; 
            color: #cbd5e1;
            -webkit-tap-highlight-color: transparent;
        }
        
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Glassmorphism Cards */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-grid-item { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .card-grid-item:active { transform: scale(0.96); }
        .card-grid-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(34, 211, 238, 0.05), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }
        .card-grid-item:hover::before { transform: translateX(100%); }

        .text-shadow-glow { text-shadow: 0 0 15px rgba(6, 182, 212, 0.6); }

        /* Bottom Navigation */
        .fixed-bottom-nav {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.75rem;
            z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .nav-item a {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .nav-item span {
            font-size: 9px;
            font-weight: 800;
            margin-top: 4px;
            letter-spacing: 0.05em;
        }
        .nav-item.active a { color: #22d3ee; filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.4)); }
        .nav-item:hover a { color: #f8fafc; }
        
        /* Icons Mask Setup */
        [class^="icon-"] {
            width: 22px;
            height: 22px;
            display: inline-block;
            background: currentColor;
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }
        .icon-home { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>'); }
        .icon-swap { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>'); }
        .icon-plus { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'); }
        .icon-chart { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/></svg>'); }
        .icon-user { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <header class="p-6 flex justify-between items-center relative z-50">
        <div class="flex items-center gap-2 group">
            <img src="images/logo.png" alt="Logo" id="core-logo" class="w-10 h-10 transition-transform group-hover:rotate-12" onerror="this.style.display='none'">
            <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">QUAN<span class="text-cyan-400">CORE</span></h1>
        </div>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-xl mx-auto px-4 pb-40 space-y-6 relative z-10">
        <div class="glass-card bg-gradient-to-br from-cyan-500/10 to-transparent p-8 rounded-[2.5rem] shadow-2xl border-white/5">
            <div class="mb-8">
                <div class="flex items-center gap-3 mb-1">
                    <span id="status-indicator" class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
                    <h2 class="text-2xl font-black uppercase italic text-white tracking-tighter" id="project-title">Quantum Pulse v4.2</h2>
                </div>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mono">
                    Liquidity Terminal | <span id="core-id-display" class="text-cyan-500 italic text-shadow-glow">LINKING...</span>
                </p>
            </div>
            
            <div id="stats-container" class="grid grid-cols-2 gap-4">
                <div class="bg-black/40 p-5 rounded-2xl border border-white/5 shadow-inner">
                    <p class="text-[9px] text-slate-500 uppercase font-black mb-1 tracking-widest">QC Balance</p>
                    <p class="text-xl font-black text-white mono" id="main-balance-qc">0.00 QC</p>
                </div>
                <div class="bg-black/40 p-5 rounded-2xl border border-white/5 shadow-inner">
                    <p class="text-[9px] text-slate-500 uppercase font-black mb-1 tracking-widest">TON Wallet</p>
                    <p class="text-xl font-black text-cyan-400 mono" id="main-balance-ton">0.00 TON</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="swap.html" class="card-grid-item glass-card p-6 rounded-3xl hover:bg-white/5 group">
                <h3 class="font-bold text-lg text-white">Обмен</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold mono">Swap Engine</p>
                <div class="flex justify-end mt-4">
                    <svg class="w-6 h-6 text-cyan-500 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                </div>
            </a>

            <a href="assets.html" class="card-grid-item glass-card p-6 rounded-3xl hover:bg-white/5 group">
                <h3 class="font-bold text-lg text-white">Активы</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold mono">Wallet Assets</p>
                <div class="flex justify-end mt-4 text-cyan-900 group-hover:text-cyan-400 transition-colors">
                    <span class="text-2xl font-black">$</span>
                </div>
            </a>

            <a href="pools.html" class="card-grid-item glass-card p-6 rounded-3xl hover:bg-white/5 group">
                <h3 class="font-bold text-lg text-blue-400 tracking-tight">Пулы</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold mono">Liquidity</p>
                <div class="flex justify-end mt-4">
                    <svg class="w-6 h-6 text-blue-500/30 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                </div>
            </a>

            <a href="airdrop.html" class="card-grid-item glass-card p-6 rounded-3xl hover:bg-white/5 group">
                <h3 class="font-bold text-lg text-orange-400">Airdrop</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold mono">Rewards</p>
                <div class="flex justify-end mt-4">
                    <svg class="w-6 h-6 text-orange-500/30 group-hover:text-orange-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                </div>
            </a>

            <a href="forge.html" class="card-grid-item glass-card p-6 rounded-3xl hover:bg-white/5 group">
                <h3 class="font-bold text-lg text-purple-400">Создать</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold mono">Jetton Forge</p>
                <div class="flex justify-end mt-2">
                    <span class="text-3xl font-light text-purple-500/30 group-hover:text-purple-400 transition-colors">+</span>
                </div>
            </a>

            <a href="staking.html" class="card-grid-item glass-card p-6 rounded-3xl hover:bg-white/5 group">
                <h3 class="font-bold text-lg text-green-400">Стейкинг</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold mono">Yield</p>
                <div class="flex justify-end mt-4">
                    <svg class="w-6 h-6 text-green-500/20 group-hover:text-green-500 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                </div>
            </a>
        </div>
    </main>

    <nav class="fixed-bottom-nav">
        <div class="nav-item active"><a href="index.html"><i class="icon-home"></i><span>HOME</span></a></div>
        <div class="nav-item"><a href="swap.html"><i class="icon-swap"></i><span>SWAP</span></a></div>
        <div class="nav-item"><a href="forge.html"><i class="icon-plus"></i><span>FORGE</span></a></div>
        <div class="nav-item"><a href="assets.html"><i class="icon-chart"></i><span>DATA</span></a></div>
        <div class="nav-item"><a href="admin.html"><i class="icon-user"></i><span>OPERATOR</span></a></div>
    </nav>

    <script>
        // --- 0. Telegram Mini App Initialize ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // --- NEW: Visit Tracking ---
        async function trackVisit() {
            try {
                // Отправляем данные инициализации на сервер для регистрации визита
                await fetch('/api/track-visit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        initData: tg.initData,
                        platform: tg.platform,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (e) { console.error("Tracking Error", e); }
        }
        trackVisit(); // Регистрация при входе

        // --- 1. WebSocket Integration ---
        let ws;
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'UPDATE' || data.type === 'INIT') {
                        const qcBalEl = document.getElementById('main-balance-qc');
                        const tonBalEl = document.getElementById('main-balance-ton');
                        
                        if (qcBalEl && data.qc_balance !== undefined) {
                            qcBalEl.innerText = parseFloat(data.qc_balance).toFixed(2) + " QC";
                        }
                        
                        if (tonBalEl && data.balance !== undefined && !tonConnectUI.connected) {
                            tonBalEl.innerText = parseFloat(data.balance).toFixed(2) + " TON";
                        }
                    }
                } catch (err) { console.error("WS Parse Error", err); }
            };

            ws.onclose = () => { setTimeout(connectWS, 3000); };
            ws.onerror = () => { ws.close(); };
        }
        connectWS();

        // --- 2. TON Connect Setup ---
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        async function fetchBlockchainBalance(address) {
            try {
                const response = await fetch(`https://toncenter.com/api/v2/getAddressBalance?address=${address}`);
                const data = await response.json();
                if (data.ok) return (parseFloat(data.result) / 1000000000).toFixed(2);
                return null;
            } catch (err) { return null; }
        }

        tonConnectUI.onStatusChange(async (wallet) => {
            const tonBalEl = document.getElementById('main-balance-ton');
            const statusEl = document.getElementById('core-id-display');
            const indicator = document.getElementById('status-indicator');

            if (wallet) {
                const address = wallet.account.address;
                const realBalance = await fetchBlockchainBalance(address);
                
                if (realBalance !== null && tonBalEl) {
                    tonBalEl.innerText = realBalance + " TON";
                    tonBalEl.classList.add('text-shadow-glow');
                }

                if (statusEl) {
                    statusEl.innerText = "LINKED | " + address.slice(0, 6) + "...";
                    statusEl.className = "text-green-400 italic text-shadow-glow";
                }
                if (indicator) {
                    indicator.className = "w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]";
                }

                fetch('/api/wallet/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        address: address, 
                        balance: realBalance || 0,
                        tg_data: tg.initData 
                    })
                }).catch(() => {});

            } else {
                if (statusEl) {
                    statusEl.innerText = "LINKING...";
                    statusEl.className = "text-cyan-500 italic";
                }
                if (indicator) indicator.className = "w-2 h-2 rounded-full bg-cyan-500 animate-pulse";
            }
        });

        // --- 3. Background Animation ---
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            const resize = () => { 
                canvas.width = window.innerWidth; 
                canvas.height = window.innerHeight;
                particles = []; 
                for(let i=0; i<80; i++) particles.push(new Particle());
            };
            window.addEventListener('resize', resize);
            
            class Particle {
                constructor() { this.init(); }
                init() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.speed = Math.random() * 0.3 + 0.1;
                    this.opacity = Math.random() * 0.15;
                    this.size = Math.random() * 1.5;
                }
                update() { this.y -= this.speed; if (this.y < 0) this.init(); }
                draw() { 
                    ctx.fillStyle = `rgba(34, 211, 238, ${this.opacity})`; 
                    ctx.fillRect(this.x, this.y, this.size, this.size); 
                }
            }
            resize();
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        async function updateCoreData() {
            try {
                const response = await fetch('/api/stats');
                if (!response.ok) return;
                const data = await response.json();
                document.getElementById('main-balance-qc').innerText = (parseFloat(data.qc_balance) || 0).toFixed(2) + " QC";
                if (!tonConnectUI.connected) {
                    document.getElementById('main-balance-ton').innerText = (parseFloat(data.balance) || 0).toFixed(2) + " TON";
                }
            } catch (e) {}
        }
        updateCoreData();
        setInterval(updateCoreData, 30000);
    </script>
</body>
</html>
