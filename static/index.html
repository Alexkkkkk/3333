<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050b10]">
    <canvas id="bg-canvas"></canvas>
    
    <header class="p-6 flex justify-between items-center relative z-50">
        <div class="flex items-center gap-2">
            <img src="/images/logo.png" alt="Logo" id="core-logo" class="w-10 h-10">
            <h1 class="text-xl font-black italic text-white uppercase">QUAN<span class="text-cyan-400">CORE</span></h1>
        </div>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-32 space-y-6 relative z-10">
        <div class="glass-card bg-gradient-to-br from-cyan-500/10 to-transparent p-6 rounded-3xl border border-white/10 backdrop-blur-md">
            <div class="mb-6">
                <h2 class="text-3xl font-black uppercase italic text-white" id="project-title">Quantum Pulse v4.1</h2>
                <p class="text-slate-400 text-xs">Терминал ликвидности TON | <span id="core-id-display" class="text-cyan-500">OFFLINE</span></p>
            </div>
            <div class="flex gap-4">
                <div class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] text-slate-500 uppercase font-bold">QC BALANCE</p>
                    <p class="text-xl font-black text-white" id="main-balance-qc">0.00 QC</p>
                </div>
                <div class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] text-slate-500 uppercase font-bold">WALLET TON</p>
                    <p class="text-xl font-black text-cyan-400" id="main-balance-ton">0.00 TON</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="swap.html" class="card-grid-item bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 transition-all group">
                <h3 class="font-bold text-lg text-white">Обмен</h3>
                <p class="text-[10px] text-slate-500 uppercase">Fast Swap Engine</p>
                <div class="flex justify-end mt-2">
                    <svg class="w-5 h-5 text-cyan-500 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                </div>
            </a>
            <a href="assets.html" class="card-grid-item bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 transition-all group">
                <h3 class="font-bold text-lg text-white">Мои Монеты</h3>
                <p class="text-[10px] text-slate-500 uppercase">Wallet Assets</p>
                <div class="flex justify-end mt-2 text-cyan-900">
                    <span class="text-xl font-bold">$</span>
                </div>
            </a>
            <a href="forge.html" class="card-grid-item bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 transition-all group">
                <h3 class="font-bold text-lg text-white">Создать</h3>
                <p class="text-[10px] text-slate-500 uppercase">Jetton Forge</p>
                <div class="flex justify-end mt-2">
                    <span class="text-2xl text-purple-500/50">+</span>
                </div>
            </a>
            <a href="staking.html" class="card-grid-item bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 transition-all group">
                <h3 class="font-bold text-lg text-white">Стейкинг</h3>
                <p class="text-[10px] text-slate-500 uppercase">Earn Rewards</p>
                <div class="flex justify-end mt-2">
                    <svg class="w-6 h-6 text-green-500/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                </div>
            </a>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/60 backdrop-blur-2xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-cyan-400">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-bold">HOME</span>
        </a>
        <a href="swap.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="text-[9px] font-bold">SWAP</span>
        </a>
        <a href="forge.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            <span class="text-[9px] font-bold">FORGE</span>
        </a>
        <a href="assets.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[9px] font-bold">DATA</span>
        </a>
        <a href="/admin" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[9px] font-bold">OPERATOR</span>
        </a>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        async function updateCoreData() {
            try {
                const response = await fetch('/api/stats'); // Изменил на stats для получения баланса и ID
                const data = await response.json();
                
                if (data.engine) {
                    document.getElementById('core-id-display').innerText = data.engine.core_id;
                    document.getElementById('main-balance-ton').innerText = data.balance + " TON";
                    // Если есть данные о статусе, можно менять статус ONLINE/OFFLINE
                    if(data.engine.status === "ACTIVE") {
                        document.getElementById('core-id-display').classList.replace('text-slate-500', 'text-cyan-500');
                    }
                }
            } catch (e) {
                console.log("Core API connection error");
            }
        }

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                // Логика при подключении кошелька
                console.log("Wallet connected:", wallet.account.address);
            }
        });

        // Background Animation
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { 
                canvas.width = window.innerWidth; 
                canvas.height = window.innerHeight; 
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.speed = Math.random() * 0.5 + 0.1;
                    this.opacity = Math.random() * 0.2;
                }
                update() { 
                    this.y -= this.speed; 
                    if (this.y < 0) this.y = canvas.height; 
                }
                draw() { 
                    ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`; 
                    ctx.fillRect(this.x, this.y, 1, 1); 
                }
            }
            for(let i=0; i<80; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        updateCoreData();
        setInterval(updateCoreData, 10000);
    </script>
</body>
</html>
