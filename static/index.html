<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM | Neural Liquidity Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #020508;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1a3a5a 0%, transparent 60%);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .hero-glow { text-shadow: 0 0 30px rgba(0, 242, 255, 0.5); }
        .glass-card {
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen">
    <nav class="flex justify-between items-center p-8 max-w-7xl mx-auto">
        <div class="orbitron text-2xl font-bold tracking-tighter text-[#00f2ff]">QUANTUM</div>
        <div class="space-x-8 text-xs uppercase tracking-widest text-gray-400">
            <a href="#" class="hover:text-white transition">Protocol</a>
            <a href="#" class="hover:text-white transition">Analytics</a>
            <a href="/admin" class="px-4 py-2 border border-[#00f2ff] text-[#00f2ff] rounded-full hover:bg-[#00f2ff] hover:text-black transition">Terminal</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto text-center mt-20 px-6">
        <h1 class="orbitron text-6xl md:text-8xl font-bold mb-6 hero-glow italic">NEURAL<br><span class="text-[#00f2ff]">SENTINEL</span></h1>
        <p class="text-xl text-gray-400 mb-12 max-w-2xl mx-auto">Самообучающийся протокол ликвидности на базе ИИ. Анализ DeDust в реальном времени.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-8 rounded-2xl">
                <div class="text-[#00f2ff] mb-2 text-xs uppercase">Liquidity</div>
                <div class="text-3xl orbitron">$4.2M</div>
            </div>
            <div class="glass-card p-8 rounded-2xl">
                <div class="text-[#00f2ff] mb-2 text-xs uppercase">Daily Volume</div>
                <div class="text-3xl orbitron">$128K</div>
            </div>
            <div class="glass-card p-8 rounded-2xl">
                <div class="text-[#00f2ff] mb-2 text-xs uppercase">AI Efficiency</div>
                <div class="text-3xl orbitron">99.4%</div>
            </div>
        </div>
    </main>
</body>
</html>
