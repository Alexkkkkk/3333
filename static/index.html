<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM CORE | ELITE TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --accent-deep: #0062ff;
            --bg: #020609;
            --glass: rgba(13, 20, 30, 0.7);
            --border: rgba(0, 242, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% -20%, #003a5f 0%, #020609 60%);
        }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-quantum {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            transition: 0.4s;
            position: relative;
            z-index: 1;
        }

        .btn-quantum:disabled {
            filter: grayscale(1);
            opacity: 0.5;
            cursor: not-allowed;
        }

        .quantum-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s;
        }
        .quantum-input:focus-within { border-color: var(--accent); }

        .tab-content { display: none; opacity: 0; transform: translateY(10px); }
        .tab-content.active { display: block; animation: fadeIn 0.6s forwards; }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .glow-orb {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%; filter: blur(60px); pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="glow-orb top-[-100px] left-[-100px]"></div>
    <div class="glow-orb bottom-[-100px] right-[-100px]"></div>

    <header class="max-w-7xl mx-auto px-6 py-10 flex justify-between items-center">
        <div class="flex items-center gap-5 group cursor-pointer" onclick="switchTab('home')">
            <div class="w-14 h-14 bg-gradient-to-br from-[#00f2ff] to-[#0062ff] rounded-[22px] flex items-center justify-center shadow-[0_0_30px_rgba(0,242,255,0.3)]">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            </div>
            <div>
                <h1 class="text-3xl font-black tracking-tighter leading-none">QUANTUM<span class="text-transparent bg-clip-text bg-gradient-to-r from-[#00f2ff] to-[#0062ff]">CORE</span></h1>
                <p class="text-[11px] font-mono text-slate-500 tracking-[0.3em] uppercase mt-1">Terminal Edition v4.0</p>
            </div>
        </div>

        <nav class="hidden md:flex bg-white/5 border border-white/10 p-1.5 rounded-3xl backdrop-blur-2xl">
            <button class="nav-item active px-8 py-3 rounded-2xl text-sm font-bold transition-all text-white bg-white/5" onclick="switchTab('home', this)">Dashboard</button>
            <button class="nav-item px-8 py-3 rounded-2xl text-sm font-bold transition-all text-slate-400 hover:text-white" onclick="switchTab('swap', this)">Exchange</button>
            <button class="nav-item px-8 py-3 rounded-2xl text-sm font-bold transition-all text-slate-400 hover:text-white" onclick="switchTab('liquidity', this)">Liquidity</button>
        </nav>

        <div class="flex items-center gap-6">
            <button id="connectBtn" class="btn-quantum px-8 py-4 rounded-[20px] font-extrabold text-sm tracking-wide">Connect Wallet</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <section id="home" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-8 space-y-8">
                    <div class="glass-card p-14 relative overflow-hidden group">
                        <div class="relative z-10">
                            <div class="flex items-center gap-3 mb-8"><span class="h-[1px] w-12 bg-blue-500"></span><span class="text-[#00f2ff] text-xs font-black uppercase tracking-[0.2em]">Neural Network Engine</span></div>
                            <h2 class="text-6xl font-black mb-8 leading-[1.1]">Next-Gen <br><span class="text-slate-600">Trading Pulse.</span></h2>
                            <p class="text-slate-400 text-xl max-w-lg mb-12">Агрегатор ликвидности нового поколения. Свопы через протокол <span class="text-white font-bold">DeDust</span>.</p>
                            <div class="flex gap-6">
                                <button onclick="switchTab('swap')" class="btn-quantum px-12 py-5 rounded-2xl font-black text-lg">Start Swap</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="swap" class="tab-content max-w-xl mx-auto pt-10">
            <div class="glass-card p-10">
                <h2 class="text-3xl font-black mb-10">Quantum Swap</h2>
                
                <div class="space-y-3 relative">
                    <div class="quantum-input p-8 rounded-[30px]">
                        <div class="flex justify-between text-[11px] font-black text-slate-500 uppercase mb-4"><span>You Sell</span><span id="wallet-balance">Bal: 0.00</span></div>
                        <div class="flex justify-between items-center">
                            <input type="number" id="swapInput" placeholder="0.00" class="bg-transparent text-5xl font-black outline-none w-2/3">
                            <div class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-xl"><div class="w-6 h-6 bg-blue-500 rounded-full"></div><span class="font-bold">TON</span></div>
                        </div>
                    </div>

                    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-20">
                        <div class="w-12 h-12 bg-[#020609] border border-white/10 rounded-xl flex items-center justify-center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="3"><path d="M7 10l5 5 5-5"/></svg></div>
                    </div>

                    <div class="quantum-input p-8 rounded-[30px]">
                        <div class="flex justify-between text-[11px] font-black text-slate-500 uppercase mb-4"><span>You Receive</span><span class="text-[#00f2ff]">DeDust Route</span></div>
                        <div class="flex justify-between items-center">
                            <input type="number" id="swapOutput" readonly placeholder="0.00" class="bg-transparent text-5xl font-black outline-none w-2/3 text-slate-600">
                            <div class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-xl"><div class="w-6 h-6 bg-purple-600 rounded-full"></div><span class="font-bold">QUAN</span></div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 bg-white/5 rounded-3xl p-6 space-y-3 text-xs font-bold border border-white/5">
                    <div class="flex justify-between"><span class="text-slate-500">Price Impact</span><span class="text-emerald-400">< 0.01%</span></div>
                    <div class="flex justify-between"><span class="text-slate-500">Fee</span><span class="text-white">0.25%</span></div>
                </div>

                <button id="confirmSwap" class="w-full mt-10 btn-quantum py-6 rounded-[28px] font-black text-xl uppercase" disabled>Connect Wallet first</button>
            </div>
        </section>

        <section id="liquidity" class="tab-content pt-10">
            <div class="glass-card p-12">
                <h2 class="text-4xl font-black mb-10 italic">Telemetry <span class="text-blue-500">Flux</span></h2>
                <div class="h-[400px] w-full"><canvas id="mainLiquidityChart"></canvas></div>
            </div>
        </section>
    </main>

    <script>
        // 1. Настройка TON Connect
        const connector = new TonConnectSDK.TonConnect({
            manifestUrl: 'https://' + window.location.host + '/tonconnect-manifest.json'
        });

        const connectBtn = document.getElementById('connectBtn');
        const swapBtn = document.getElementById('confirmSwap');
        const inputField = document.getElementById('swapInput');
        const outputField = document.getElementById('swapOutput');

        // Подключение кошелька
        connectBtn.onclick = async () => {
            if (connector.connected) {
                await connector.disconnect();
            } else {
                const walletConnectionSource = { universalLink: 'https://tonkeeper.com/ton-connect', bridgeUrl: 'https://bridge.tonapi.io/bridge' };
                window.location.href = connector.connect(walletConnectionSource);
            }
        };

        // Отслеживание статуса кошелька
        connector.onStatusChange(wallet => {
            if (wallet) {
                connectBtn.innerText = wallet.account.address.slice(0, 4) + '...' + wallet.account.address.slice(-4);
                swapBtn.innerText = 'Confirm Transaction';
                swapBtn.disabled = false;
            } else {
                connectBtn.innerText = 'Connect Wallet';
                swapBtn.innerText = 'Connect Wallet first';
                swapBtn.disabled = true;
            }
        });

        // 2. Логика Свопа (DeDust style)
        const RATE = 42.12; 
        inputField.oninput = (e) => {
            const val = parseFloat(e.target.value) || 0;
            outputField.value = (val * RATE).toFixed(4);
        };

        swapBtn.onclick = async () => {
            if (!connector.connected) return;

            const amount = (parseFloat(inputField.value) * 10**9).toString(); // В нанотоны
            
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [{
                    address: "EQBf8nNc_H6K983W8aY9u37-rG7O6f3S0L8X-Y2X-Y2X-Y2X", // Пример адреса пула DeDust
                    amount: amount,
                    payload: "" // Здесь должен быть BOC для реального смарт-контракта
                }]
            };

            try {
                await connector.sendTransaction(transaction);
                alert("Transaction sent to network!");
            } catch (e) {
                alert("Rejected: " + e.message);
            }
        };

        // 3. UI: Переключение вкладок
        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'text-white', 'bg-white/5'));
            
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active', 'text-white', 'bg-white/5');
            if(id === 'liquidity') setTimeout(initMainChart, 100);
        }

        // 4. Графики и фон (как в твоем оригинале)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<60; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: 1, speedX: Math.random()*0.2-0.1, speedY: Math.random()*0.2-0.1 });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                ctx.fillStyle = "rgba(0, 242, 255, 0.2)";
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas(); animate();

        function initMainChart() {
            const chartCtx = document.getElementById('mainLiquidityChart').getContext('2d');
            new Chart(chartCtx, {
                type: 'bar',
                data: {
                    labels: ['TON/USDT', 'TON/QUAN', 'TON/NOT'],
                    datasets: [{ label: 'TVL', data: [65000000, 28000000, 42000000], backgroundColor: '#00f2ff', borderRadius: 15 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
