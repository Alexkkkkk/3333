<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANCORE | TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            background-color: #050b10; 
            font-family: 'JetBrains Mono', monospace; 
            overflow-x: hidden; 
            color: #cbd5e1;
            -webkit-tap-highlight-color: transparent;
        }
        
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-grid-item { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .card-grid-item:active { transform: scale(0.96); }
        
        .text-shadow-glow { text-shadow: 0 0 15px rgba(6, 182, 212, 0.6); }

        .fixed-bottom-nav {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.75rem;
            z-index: 100;
        }
        
        .nav-item a {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .nav-item span { font-size: 9px; font-weight: 800; margin-top: 4px; letter-spacing: 0.05em; }
        .nav-item.active a { color: #22d3ee; filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.4)); }

        [class^="icon-"] {
            width: 22px; height: 22px;
            display: inline-block;
            background: currentColor;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }
        .icon-home { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>'); }
        .icon-swap { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>'); }
        .icon-plus { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'); }
        .icon-chart { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/></svg>'); }
        .icon-user { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'); }

        #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 1000; pointer-events: none; }
        @keyframes fade-in-down { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-down { animation: fade-in-down 0.3s ease-out forwards; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="toast-container"></div>
    
    <header class="p-6 flex justify-between items-center relative z-50">
        <div class="flex items-center gap-2 group">
            <div class="w-10 h-10 bg-cyan-500/20 rounded-xl flex items-center justify-center border border-cyan-500/30">
                <img src="images/logo.png" alt="Logo" id="core-logo" class="w-7 h-7" onerror="this.parentElement.innerHTML='<span class=\'text-cyan-500 font-bold\'>Q</span>'">
            </div>
            <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">QUAN<span class="text-cyan-400">CORE</span></h1>
        </div>
        <div id="connectBtn"></div>
    </header>

    <main class="max-w-xl mx-auto px-4 pb-40 space-y-6 relative z-10">
        <div class="glass-card bg-gradient-to-br from-cyan-500/10 to-transparent p-8 rounded-[2.5rem] shadow-2xl border-white/5">
            <div class="mb-8">
                <div class="flex items-center gap-3 mb-1">
                    <span id="status-indicator" class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
                    <h2 class="text-2xl font-black uppercase italic text-white tracking-tighter" id="project-title">Quantum Pulse v4.2</h2>
                </div>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mono">
                    Liquidity Terminal | <span id="core-id-display" class="text-cyan-500 italic text-shadow-glow">LINKING...</span>
                </p>
            </div>
            
            <div id="stats-container" class="grid grid-cols-2 gap-4">
                <div class="bg-black/40 p-5 rounded-2xl border border-white/5 shadow-inner">
                    <p class="text-[9px] text-slate-500 uppercase font-black mb-1 tracking-widest">QC Balance</p>
                    <p class="text-xl font-black text-white mono" id="main-balance-qc">0.00 QC</p>
                </div>
                <div class="bg-black/40 p-5 rounded-2xl border border-white/5 shadow-inner">
                    <p class="text-[9px] text-slate-500 uppercase font-black mb-1 tracking-widest">TON Wallet</p>
                    <p class="text-xl font-black text-cyan-400 mono" id="main-balance-ton">0.00 TON</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-4">
                <div class="px-2">
                    <p class="text-[8px] text-slate-600 uppercase font-bold">Traffic Index</p>
                    <p class="text-xs font-bold text-slate-400" id="traffic-display">SYNCING...</p>
                </div>
                <div class="px-2 text-right">
                    <p class="text-[8px] text-slate-600 uppercase font-bold">ROI 24H</p>
                    <p class="text-xs font-bold text-green-500" id="roi-display">0.00%</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="swap.html" onclick="haptic()" class="card-grid-item glass-card p-6 rounded-3xl hover:bg-white/5 group">
                <h3 class="font-bold text-lg text-white">Обмен</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold mono">Swap Engine</p>
                <div class="flex justify-end mt-4">
                    <svg class="w-6 h-6 text-cyan-500 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                </div>
            </a>
            <a href="assets.html" onclick="haptic()" class="card-grid-item glass-card p-6 rounded-3xl hover:bg-white/5 group">
                <h3 class="font-bold text-lg text-white">Активы</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold mono">Wallet Assets</p>
                <div class="flex justify-end mt-4 text-cyan-900 group-hover:text-cyan-400 transition-colors">
                    <span class="text-2xl font-black">$</span>
                </div>
            </a>
            <a href="pools.html" onclick="haptic()" class="card-grid-item glass-card p-6 rounded-3xl hover:bg-white/5 group">
                <h3 class="font-bold text-lg text-blue-400 tracking-tight">Пулы</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold mono">Liquidity</p>
                <div class="flex justify-end mt-4">
                    <svg class="w-6 h-6 text-blue-500/30 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                </div>
            </a>
            <a href="staking.html" onclick="haptic()" class="card-grid-item glass-card p-6 rounded-3xl hover:bg-white/5 group">
                <h3 class="font-bold text-lg text-green-400">Стейкинг</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold mono">Yield</p>
                <div class="flex justify-end mt-4">
                    <svg class="w-6 h-6 text-green-500/20 group-hover:text-green-500 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                </div>
            </a>
        </div>
    </main>

    <nav class="fixed-bottom-nav">
        <div class="nav-item active"><a href="index.html" onclick="haptic()"><i class="icon-home"></i><span>HOME</span></a></div>
        <div class="nav-item"><a href="swap.html" onclick="haptic()"><i class="icon-swap"></i><span>SWAP</span></a></div>
        <div class="nav-item"><a href="forge.html" onclick="haptic()"><i class="icon-plus"></i><span>FORGE</span></a></div>
        <div class="nav-item"><a href="assets.html" onclick="haptic()"><i class="icon-chart"></i><span>DATA</span></a></div>
        <div class="nav-item"><a href="admin.html" onclick="haptic()"><i class="icon-user"></i><span>OPERATOR</span></a></div>
    </nav>

    <script>
        // 1. Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function haptic() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'glass-card mb-2 px-4 py-2 rounded-xl text-[10px] font-bold text-cyan-400 border-cyan-500/30 animate-fade-in-down';
            toast.innerText = `> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 2. WebSocket Синхронизация (с вашей функцией QuantumOrchestrator.pulse)
        let ws;
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    // Обработка CORE_PULSE от бэкенда
                    if (msg.event === "CORE_PULSE" || msg.type === "UPDATE") {
                        const data = msg.data;
                        if (data.qc_balance !== undefined) 
                            document.getElementById('main-balance-qc').innerText = data.qc_balance + " QC";
                        
                        if (data.traffic !== undefined)
                            document.getElementById('traffic-display').innerText = `ACTIVE_NODES: ${data.traffic}`;
                        
                        if (data.roi_24h !== undefined)
                            document.getElementById('roi-display').innerText = data.roi_24h + "%";

                        // Если кошелек не подключен через TON Connect, берем баланс из БД
                        if (!tonConnectUI.connected && data.recent_actions && data.recent_actions.length > 0) {
                             // Логика отображения общего баланса системы или последнего действия
                        }
                    }
                } catch (err) { console.error("WS Sync Error", err); }
            };

            ws.onclose = () => setTimeout(connectWS, 3000);
        }
        connectWS();

        // 3. TON Connect & SQL Integration
        const tonConnectUI = new TonConnectUI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        tonConnectUI.onStatusChange(async (wallet) => {
            const statusEl = document.getElementById('core-id-display');
            const indicator = document.getElementById('status-indicator');

            if (wallet) {
                const address = wallet.account.address;
                const balanceRaw = wallet.account.balance || 0; 
                const balanceTon = (balanceRaw / 1000000000).toFixed(2);

                document.getElementById('main-balance-ton').innerText = balanceTon + " TON";
                statusEl.innerText = "LINKED | " + address.slice(0, 6) + "...";
                statusEl.className = "text-green-400 italic text-shadow-glow";
                indicator.className = "w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]";

                // СИНХРОНИЗАЦИЯ С ВАШИМ SQL (save_wallet_state)
                fetch('/api/sync_wallet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        address: address, 
                        balance: parseFloat(balanceTon),
                        qc: 0.0 // Будет обновлено бэкендом
                    })
                });
                showToast("CORE LINKED TO BLOCKCHAIN");
            }
        });

        // 4. Background Animation (Visual Core)
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let p = [];
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            window.addEventListener('resize', resize); resize();
            for(let i=0; i<50; i++) p.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*0.5});
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "rgba(34, 211, 238, 0.1)";
                p.forEach(part => {
                    part.y -= part.s; if(part.y < 0) part.y = canvas.height;
                    ctx.fillRect(part.x, part.y, 1, 1);
                });
                requestAnimationFrame(anim);
            }
            anim();
        }
    </script>
</body>
</html>
