            </div>
            <div class="flex gap-4">

                <div class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] text-slate-500 uppercase font-bold">WALLET TON</p>
                    <p class="text-xl font-black text-cyan-400" id="main-balance-ton">0.00 TON</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="swap.html" class="card-grid-item bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 group">
                <h3 class="font-bold text-lg text-white">Обмен</h3>
                <p class="text-[10px] text-slate-500 uppercase">Fast Swap Engine</p>
                <div class="flex justify-end mt-2">
                    <svg class="w-5 h-5 text-cyan-500 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                </div>
            </a>

            <a href="operator.html" class="card-grid-item bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 group">
                <h3 class="font-bold text-lg text-white">Мои Монеты</h3>
                <p class="text-[10px] text-slate-500 uppercase">Wallet Assets</p>
                <div class="flex justify-end mt-2 text-cyan-900 group-hover:text-cyan-500 transition-colors">
                    <span class="text-xl font-bold">$</span>

            </a>

            <a href="pools.html" class="card-grid-item bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 group">
                <h3 class="font-bold text-lg text-white text-blue-400">Пулы</h3>
                <p class="text-[10px] text-slate-500 uppercase">Liquidity Pools</p>
                <div class="flex justify-end mt-2">
                    <svg class="w-5 h-5 text-blue-500/40 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                </div>
            </a>

            <a href="airdrop.html" class="card-grid-item bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 group">
                <h3 class="font-bold text-lg text-white text-orange-400">Airdrop</h3>
                <p class="text-[10px] text-slate-500 uppercase">Claim Rewards</p>
                <div class="flex justify-end mt-2">
                    <svg class="w-5 h-5 text-orange-500/40 group-hover:text-orange-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                </div>
            </a>

            <a href="forge.html" class="card-grid-item bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 group">
                <h3 class="font-bold text-lg text-white">Создать</h3>
                <p class="text-[10px] text-slate-500 uppercase">Jetton Forge</p>
                <div class="flex justify-end mt-2">
                    <span class="text-2xl text-purple-500/50 group-hover:text-purple-400 transition-colors">+</span>

            <a href="staking.html" class="card-grid-item bg-white/5 p-6 rounded-2xl border border-white/10 hover:bg-white/10 group">

    <nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-2xl border-t border-white/5 p-3 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-cyan-400">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[8px] font-black uppercase">Home</span>
        </a>
        <a href="swap.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="text-[8px] font-black uppercase">Swap</span>
        </a>
        <a href="pools.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            <span class="text-[8px] font-black uppercase">Pools</span>
        </a>
        <a href="operator.html" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[8px] font-black uppercase">Data</span>
        </a>
        <a href="/admin" class="flex flex-col items-center text-slate-500 hover:text-white transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[8px] font-black uppercase">Admin</span>
        </a>
    </nav>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: window.location.origin + '/static/tonconnect-manifest.json',
            buttonRootId: 'connectBtn'
        });

        async function updateCoreData() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                if (data.engine) {
                    document.getElementById('core-id-display').innerText = data.engine.core_id;
                    document.getElementById('main-balance-ton').innerText = data.balance + " TON";
                    
                    if(data.engine.status === "ACTIVE") {
                        const display = document.getElementById('core-id-display');
                        display.innerText = "ONLINE | " + data.engine.core_id;
                        display.classList.remove('text-cyan-500');
                        display.classList.add('text-green-400');
                    }
                }
            } catch (e) {
                console.log("Core API connection error");
            }
        }

        // Анимация фона
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { 
                canvas.width = window.innerWidth; 
                canvas.height = window.innerHeight; 
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.speed = Math.random() * 0.3 + 0.1;
                    this.opacity = Math.random() * 0.15;
                }
                update() { 
                    this.y -= this.speed; 
                    if (this.y < 0) this.y = canvas.height; 
                }
                draw() { 
                    ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`; 
                    ctx.fillRect(this.x, this.y, 1.2, 1.2); 
                }
            }
            for(let i=0; i<70; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        updateCoreData();
        setInterval(updateCoreData, 15000);
    </script>
</body>
</html>
